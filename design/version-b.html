<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>醒醒鸦 - 玻璃态质感风</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .animate-float { animation: float 3s ease-in-out infinite; }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .shimmer {
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      background-size: 200% 100%;
      animation: shimmer 3s infinite;
    }
    .page { display: none; }
    .page.active { display: flex; }
    .glass { 
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .glass-dark {
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-100 via-slate-50 to-indigo-50 text-gray-800 font-sans min-h-screen flex flex-col">
  
  <!-- 主内容区域 -->
  <main class="flex-1 pb-20 overflow-y-auto">
    
    <!-- 测试页面 -->
    <div id="page-test" class="page active flex-col items-center justify-center min-h-screen px-6 py-12">
      <!-- Logo区域 -->
      <div class="text-center mb-12 animate-float">
        <div class="relative">
          <div class="absolute inset-0 bg-indigo-400/30 blur-2xl rounded-full"></div>
          <div class="relative text-8xl mb-4">🦅</div>
        </div>
        <h1 class="text-3xl font-bold tracking-wider bg-gradient-to-r from-gray-800 to-gray-600 bg-clip-text text-transparent">
          醒醒鸦
        </h1>
        <p class="text-gray-400 text-sm mt-2 tracking-widest">XING XING YA</p>
      </div>

      <!-- 精神状态引导语 -->
      <div class="glass rounded-3xl p-6 mb-10 max-w-xs shadow-lg shadow-indigo-100/50 border border-white/50">
        <p class="text-gray-700 text-lg leading-relaxed text-center">
          🌟 每天给自己3分钟<br>重新认识内心的状态
        </p>
      </div>

      <!-- 测试卡片 -->
      <div class="w-full max-w-sm space-y-4">
        <!-- 快速测试 -->
        <button class="w-full glass rounded-2xl p-5 flex items-center justify-between group hover:shadow-xl hover:shadow-indigo-100/50 transition-all duration-300 border border-white/80 active:scale-95">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-400 to-purple-500 flex items-center justify-center shadow-lg shadow-indigo-200/50">
              <span class="text-xl text-white">⚡</span>
            </div>
            <div class="text-left">
              <div class="font-semibold text-gray-800">快速精神自检</div>
              <div class="text-gray-500 text-sm">3分钟 · 5道题</div>
            </div>
          </div>
          <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-500 group-hover:bg-indigo-500 group-hover:text-white transition-all">
            <span>→</span>
          </div>
        </button>

        <!-- 深度测试 -->
        <button class="w-full glass rounded-2xl p-5 flex items-center justify-between group hover:shadow-xl hover:shadow-purple-100/50 transition-all duration-300 border border-white/80 active:scale-95">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-purple-400 to-pink-500 flex items-center justify-center shadow-lg shadow-purple-200/50">
              <span class="text-xl text-white">🔮</span>
            </div>
            <div class="text-left">
              <div class="font-semibold text-gray-800">深度心理分析</div>
              <div class="text-gray-500 text-sm">10分钟 · 15道题</div>
            </div>
          </div>
          <div class="w-8 h-8 rounded-full bg-purple-100 flex items-center justify-center text-purple-500 group-hover:bg-purple-500 group-hover:text-white transition-all">
            <span>→</span>
          </div>
        </button>

        <!-- 历史记录 -->
        <button class="w-full py-3 px-4 rounded-xl flex items-center justify-center gap-2 text-gray-500 hover:text-indigo-500 transition-colors">
          <span>📋</span>
          <span class="text-sm font-medium">查看测试历史</span>
        </button>
      </div>

      <!-- 底部装饰 -->
      <div class="mt-16 flex gap-3">
        <div class="w-2 h-2 rounded-full bg-indigo-300/50"></div>
        <div class="w-2 h-2 rounded-full bg-purple-300/50"></div>
        <div class="w-2 h-2 rounded-full bg-pink-300/50"></div>
      </div>
    </div>

    <!-- 聊天页面 -->
    <div id="page-chat" class="page flex-col h-screen">
      <!-- 聊天头部 -->
      <div class="glass border-b border-white/30 px-4 py-4 flex items-center gap-3 sticky top-0 z-10">
        <div class="relative">
          <div class="absolute inset-0 bg-indigo-400/30 blur-lg rounded-full"></div>
          <div class="relative w-11 h-11 bg-gradient-to-br from-indigo-400 to-purple-500 rounded-full flex items-center justify-center shadow-lg shadow-indigo-200/50">
            <span class="text-xl">🦅</span>
          </div>
        </div>
        <div>
          <h2 class="font-semibold text-gray-800">小鸦</h2>
          <p class="text-xs text-gray-500 flex items-center gap-1">
            <span class="w-1.5 h-1.5 bg-green-400 rounded-full animate-pulse"></span>
            在线 · 随时倾听
          </p>
        </div>
      </div>

      <!-- 聊天消息区域 -->
      <div class="flex-1 overflow-y-auto p-4 space-y-4 bg-gradient-to-b from-transparent via-indigo-50/30 to-transparent">
        <!-- AI消息 -->
        <div class="flex gap-3">
          <div class="relative flex-shrink-0">
            <div class="absolute inset-0 bg-indigo-400/20 blur-md rounded-full"></div>
            <div class="relative w-9 h-9 bg-gradient-to-br from-indigo-400 to-purple-500 rounded-full flex items-center justify-center shadow-lg shadow-indigo-200/50">
              <span class="text-sm">🦅</span>
            </div>
          </div>
          <div class="max-w-[78%]">
            <div class="glass rounded-2xl rounded-tl-sm px-4 py-3 shadow-lg shadow-gray-100/50 border border-white/60">
              <p class="text-gray-700 text-sm leading-relaxed">
                你好，我是小鸦 🌟<br><br>
                有什么想聊聊的？工作压力、情绪困扰、人际关系...或者只是想找个人说说心里话。
              </p>
            </div>
            <span class="text-xs text-gray-400 mt-1.5 block">刚刚</span>
          </div>
        </div>

        <!-- 用户消息 -->
        <div class="flex gap-3 justify-end">
          <div class="max-w-[78%]">
            <div class="bg-gradient-to-br from-indigo-500 to-purple-600 text-white rounded-2xl rounded-tr-sm px-4 py-3 shadow-lg shadow-indigo-200/50">
              <p class="text-sm leading-relaxed">
                最近总是失眠，白天也没精神...
              </p>
            </div>
            <span class="text-xs text-gray-400 mt-1.5 block text-right">刚刚</span>
          </div>
        </div>

        <!-- AI回复 -->
        <div class="flex gap-3">
          <div class="relative flex-shrink-0">
            <div class="absolute inset-0 bg-indigo-400/20 blur-md rounded-full"></div>
            <div class="relative w-9 h-9 bg-gradient-to-br from-indigo-400 to-purple-500 rounded-full flex items-center justify-center shadow-lg shadow-indigo-200/50">
              <span class="text-sm">🦅</span>
            </div>
          </div>
          <div class="max-w-[78%]">
            <div class="glass rounded-2xl rounded-tl-sm px-4 py-3 shadow-lg shadow-gray-100/50 border border-white/60">
              <p class="text-gray-700 text-sm leading-relaxed">
                听起来确实让人困扰 😔<br><br>
                失眠往往和心理状态有关。你愿意说说，最近是什么让你难以入睡吗？是担忧某件事，还是脑海里总有很多想法？
              </p>
            </div>
            <span class="text-xs text-gray-400 mt-1.5 block">刚刚</span>
          </div>
        </div>
      </div>

      <!-- 快捷提示 -->
      <div class="glass border-t border-white/30 px-4 py-3 flex gap-2 overflow-x-auto">
        <button class="flex-shrink-0 px-4 py-2 bg-gradient-to-r from-indigo-50 to-purple-50 rounded-full text-xs text-indigo-600 hover:from-indigo-100 hover:to-purple-100 transition-all border border-indigo-100">
          工作压力大
        </button>
        <button class="flex-shrink-0 px-4 py-2 bg-gradient-to-r from-purple-50 to-pink-50 rounded-full text-xs text-purple-600 hover:from-purple-100 hover:to-pink-100 transition-all border border-purple-100">
          失眠焦虑
        </button>
        <button class="flex-shrink-0 px-4 py-2 bg-gradient-to-r from-pink-50 to-rose-50 rounded-full text-xs text-pink-600 hover:from-pink-100 hover:to-rose-100 transition-all border border-pink-100">
          情绪低落
        </button>
      </div>

      <!-- 输入区域 -->
      <div class="glass border-t border-white/30 px-4 py-4 sticky bottom-0">
        <div class="flex items-end gap-3">
          <div class="flex-1 glass-dark rounded-2xl px-4 py-3 flex items-center border border-white/20">
            <input type="text" placeholder="说点什么..." class="flex-1 bg-transparent outline-none text-sm text-gray-800 placeholder-gray-400">
          </div>
          <button class="w-12 h-12 bg-gradient-to-br from-indigo-500 to-purple-600 text-white rounded-full flex items-center justify-center shadow-lg shadow-indigo-200/50 hover:shadow-xl hover:scale-105 transition-all active:scale-95">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </main>

  <!-- 底部导航栏 -->
  <nav class="fixed bottom-0 left-0 right-0 glass border-t border-white/40 shadow-xl shadow-indigo-100/30 safe-area-bottom">
    <div class="flex justify-around items-center h-16 relative">
      <!-- 顶部装饰线 -->
      <div class="absolute top-0 left-1/2 -translate-x-1/2 w-12 h-1 bg-gradient-to-r from-indigo-400 to-purple-500 rounded-full"></div>
      
      <!-- 测试Tab -->
      <button class="nav-tab relative flex flex-col items-center justify-center w-1/2 h-full text-gray-400 transition-all duration-300 active:scale-95" data-tab="test">
        <div class="tab-icon w-10 h-10 mb-1 flex items-center justify-center rounded-xl transition-all duration-300">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
          </svg>
        </div>
        <span class="tab-text text-xs font-medium tracking-wide">测试</span>
      </button>

      <!-- 聊天Tab -->
      <button class="nav-tab relative flex flex-col items-center justify-center w-1/2 h-full text-gray-400 transition-all duration-300 active:scale-95" data-tab="chat">
        <div class="tab-icon w-10 h-10 mb-1 flex items-center justify-center rounded-xl transition-all duration-300 relative">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
          </svg>
          <span class="absolute -top-0.5 -right-0.5 w-3 h-3 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-full animate-pulse shadow-lg shadow-indigo-200/50"></span>
        </div>
        <span class="tab-text text-xs font-medium tracking-wide">聊天</span>
      </button>
    </div>
  </nav>

  <script>
    // Tab切换逻辑
    const tabs = document.querySelectorAll('.nav-tab');
    const pages = document.querySelectorAll('.page');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const targetId = tab.dataset.tab;

        // 更新Tab样式
        tabs.forEach(t => {
          t.classList.remove('text-indigo-600');
          t.classList.add('text-gray-400');
          const icon = t.querySelector('.tab-icon');
          icon.classList.remove('bg-gradient-to-br', 'from-indigo-500', 'to-purple-600', 'text-white', 'shadow-lg');
        });
        
        tab.classList.remove('text-gray-400');
        tab.classList.add('text-indigo-600');
        const clickedIcon = tab.querySelector('.tab-icon');
        clickedIcon.classList.add('bg-gradient-to-br', 'from-indigo-500', 'to-purple-600', 'text-white', 'shadow-lg', 'shadow-indigo-200/50');

        // 切换页面
        pages.forEach(page => {
          page.classList.remove('active');
        });
        document.getElementById(`page-${targetId}`).classList.add('active');
      });
    });

    // 默认激活测试Tab
    document.querySelector('[data-tab="test"]').click();
  </script>

  <style>
    .safe-area-bottom {
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
  </style>
</body>
</html>
