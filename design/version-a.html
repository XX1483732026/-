<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>醒醒鸦 - 极简黑白风</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .animate-float { animation: float 3s ease-in-out infinite; }
    @keyframes pulse-slow {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .animate-pulse-slow { animation: pulse-slow 2s ease-in-out infinite; }
    .page { display: none; }
    .page.active { display: flex; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen flex flex-col">
  
  <!-- 主内容区域 -->
  <main class="flex-1 pb-20 overflow-y-auto">
    
    <!-- 测试页面 -->
    <div id="page-test" class="page active flex-col items-center justify-center min-h-screen px-6 py-12">
      <!-- Logo区域 -->
      <div class="text-center mb-12 animate-float">
        <div class="text-7xl mb-4">🦅</div>
        <h1 class="text-3xl font-bold tracking-wider text-gray-900">醒醒鸦</h1>
        <p class="text-gray-500 text-sm mt-2 tracking-widest">XING XING YA</p>
      </div>

      <!-- 精神状态引导语 -->
      <div class="text-center mb-12 max-w-xs">
        <p class="text-gray-700 text-lg leading-relaxed">
          你有多久没有审视自己的精神状态了？
        </p>
        <p class="text-gray-400 text-sm mt-4">
          让我用几个问题，帮你看清真相
        </p>
      </div>

      <!-- 测试卡片 -->
      <div class="w-full max-w-sm space-y-4">
        <!-- 快速测试 -->
        <button class="w-full bg-gray-900 text-white py-4 px-6 rounded-2xl flex items-center justify-between group hover:bg-gray-800 transition-all duration-300 active:scale-95">
          <div class="flex items-center gap-4">
            <span class="text-2xl">⚡</span>
            <div class="text-left">
              <div class="font-semibold">快速精神自检</div>
              <div class="text-gray-400 text-sm">3分钟 · 5道题</div>
            </div>
          </div>
          <span class="text-gray-600 group-hover:text-white transition-colors">→</span>
        </button>

        <!-- 深度测试 -->
        <button class="w-full bg-white border-2 border-gray-200 text-gray-900 py-4 px-6 rounded-2xl flex items-center justify-between group hover:border-gray-900 transition-all duration-300 active:scale-95">
          <div class="flex items-center gap-4">
            <span class="text-2xl">🔮</span>
            <div class="text-left">
              <div class="font-semibold">深度心理分析</div>
              <div class="text-gray-400 text-sm">10分钟 · 15道题</div>
            </div>
          </div>
          <span class="text-gray-400 group-hover:text-gray-900 transition-colors">→</span>
        </button>

        <!-- 历史记录 -->
        <button class="w-full bg-transparent text-gray-500 py-3 px-4 rounded-xl flex items-center justify-center gap-2 hover:text-gray-700 transition-colors">
          <span>📋</span>
          <span class="text-sm">查看测试历史</span>
        </button>
      </div>

      <!-- 底部引言 -->
      <div class="mt-16 text-center px-8">
        <p class="text-gray-300 text-xs italic">
          "认识自己，是最困难的修行"
        </p>
      </div>
    </div>

    <!-- 聊天页面 -->
    <div id="page-chat" class="page flex-col h-screen">
      <!-- 聊天头部 -->
      <div class="bg-white border-b border-gray-200 px-4 py-4 flex items-center gap-3">
        <div class="w-10 h-10 bg-gray-900 rounded-full flex items-center justify-center">
          <span class="text-xl">🦅</span>
        </div>
        <div>
          <h2 class="font-semibold text-gray-900">小鸦</h2>
          <p class="text-xs text-gray-500">在线 · 随时倾听</p>
        </div>
      </div>

      <!-- 聊天消息区域 -->
      <div class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50">
        <!-- AI消息 -->
        <div class="flex gap-3">
          <div class="w-8 h-8 bg-gray-900 rounded-full flex items-center justify-center flex-shrink-0">
            <span class="text-sm">🦅</span>
          </div>
          <div class="max-w-[75%]">
            <div class="bg-white border border-gray-200 rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm">
              <p class="text-gray-800 text-sm leading-relaxed">
                你好，我是小鸦。<br><br>
                有什么想聊的，或者想让我帮你分析什么？不管是精神状态、人际关系，还是职业困惑，都可以说说看。
              </p>
            </div>
            <span class="text-xs text-gray-400 mt-1 block">刚刚</span>
          </div>
        </div>

        <!-- 用户消息 -->
        <div class="flex gap-3 justify-end">
          <div class="max-w-[75%]">
            <div class="bg-gray-900 text-white rounded-2xl rounded-tr-sm px-4 py-3">
              <p class="text-sm leading-relaxed">
                最近工作压力好大，感觉自己快撑不住了
              </p>
            </div>
            <span class="text-xs text-gray-400 mt-1 block text-right">刚刚</span>
          </div>
        </div>

        <!-- AI回复 -->
        <div class="flex gap-3">
          <div class="w-8 h-8 bg-gray-900 rounded-full flex items-center justify-center flex-shrink-0">
            <span class="text-sm">🦅</span>
          </div>
          <div class="max-w-[75%]">
            <div class="bg-white border border-gray-200 rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm">
              <p class="text-gray-800 text-sm leading-relaxed">
                嗯，听起来你最近确实很辛苦。<br><br>
                能具体说说是什么让你感到这么大的压力吗？是工作量、人际关系，还是对未来的焦虑？
              </p>
            </div>
            <span class="text-xs text-gray-400 mt-1 block">刚刚</span>
          </div>
        </div>
      </div>

      <!-- 快捷提示 -->
      <div class="bg-white border-t border-gray-200 px-4 py-3 flex gap-2 overflow-x-auto">
        <button class="flex-shrink-0 px-3 py-1.5 bg-gray-100 rounded-full text-xs text-gray-600 hover:bg-gray-200 transition-colors">
          工作压力大
        </button>
        <button class="flex-shrink-0 px-3 py-1.5 bg-gray-100 rounded-full text-xs text-gray-600 hover:bg-gray-200 transition-colors">
          失眠焦虑
        </button>
        <button class="flex-shrink-0 px-3 py-1.5 bg-gray-100 rounded-full text-xs text-gray-600 hover:bg-gray-200 transition-colors">
          情绪低落
        </button>
        <button class="flex-shrink-0 px-3 py-1.5 bg-gray-100 rounded-full text-xs text-gray-600 hover:bg-gray-200 transition-colors">
          人际困扰
        </button>
      </div>

      <!-- 输入区域 -->
      <div class="bg-white border-t border-gray-200 px-4 py-4">
        <div class="flex items-end gap-3">
          <div class="flex-1 bg-gray-100 rounded-2xl px-4 py-3 flex items-center">
            <input type="text" placeholder="输入消息..." class="flex-1 bg-transparent outline-none text-sm text-gray-800 placeholder-gray-400">
          </div>
          <button class="w-12 h-12 bg-gray-900 text-white rounded-full flex items-center justify-center hover:bg-gray-800 transition-colors active:scale-95">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </main>

  <!-- 底部导航栏 -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 safe-area-bottom">
    <div class="flex justify-around items-center h-16">
      <!-- 测试Tab -->
      <button class="nav-tab flex flex-col items-center justify-center w-1/2 h-full text-gray-400 transition-all duration-300 active:scale-95" data-tab="test">
        <div class="tab-icon w-7 h-7 mb-1 flex items-center justify-center">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
          </svg>
        </div>
        <span class="tab-text text-xs font-medium tracking-wide">测试</span>
      </button>

      <!-- 聊天Tab -->
      <button class="nav-tab flex flex-col items-center justify-center w-1/2 h-full text-gray-400 transition-all duration-300 active:scale-95" data-tab="chat">
        <div class="tab-icon w-7 h-7 mb-1 flex items-center justify-center relative">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
          </svg>
          <span class="absolute -top-1 -right-1 w-2 h-2 bg-gray-900 rounded-full animate-pulse-slow"></span>
        </div>
        <span class="tab-text text-xs font-medium tracking-wide">聊天</span>
      </button>
    </div>
  </nav>

  <script>
    // Tab切换逻辑
    const tabs = document.querySelectorAll('.nav-tab');
    const pages = document.querySelectorAll('.page');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const targetId = tab.dataset.tab;

        // 更新Tab样式
        tabs.forEach(t => {
          t.classList.remove('text-gray-900');
          t.classList.add('text-gray-400');
          const icon = t.querySelector('.tab-icon');
          icon.classList.remove('scale-110');
        });
        
        tab.classList.remove('text-gray-400');
        tab.classList.add('text-gray-900');
        const clickedIcon = tab.querySelector('.tab-icon');
        clickedIcon.classList.add('scale-110');

        // 切换页面
        pages.forEach(page => {
          page.classList.remove('active');
        });
        document.getElementById(`page-${targetId}`).classList.add('active');
      });
    });

    // 默认激活测试Tab
    document.querySelector('[data-tab="test"]').click();
  </script>

  <style>
    .safe-area-bottom {
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
  </style>
</body>
</html>
