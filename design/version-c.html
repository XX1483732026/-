<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>醒醒鸦 - 深色渐变沉浸风</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .animate-float { animation: float 4s ease-in-out infinite; }
    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 8px rgba(139, 92, 246, 0.6)); }
      50% { filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.9)); }
    }
    .animate-glow { animation: glow 2s ease-in-out infinite; }
    @keyframes gradient-shift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .gradient-animate {
      background-size: 200% 200%;
      animation: gradient-shift 4s ease infinite;
    }
    .page { display: none; }
    .page.active { display: flex; }
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.5; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    .pulse-ring::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid rgba(139, 92, 246, 0.5);
      animation: pulse-ring 2s ease-out infinite;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-950 via-purple-950 to-gray-950 text-white font-sans min-h-screen flex flex-col overflow-hidden">
  
  <!-- 背景装饰 -->
  <div class="fixed inset-0 pointer-events-none overflow-hidden">
    <!-- 渐变光晕 -->
    <div class="absolute top-0 left-1/4 w-96 h-96 bg-purple-600/20 rounded-full blur-3xl"></div>
    <div class="absolute bottom-1/4 right-1/4 w-80 h-80 bg-cyan-500/10 rounded-full blur-3xl"></div>
    <div class="absolute top-1/2 right-0 w-64 h-64 bg-pink-500/10 rounded-full blur-3xl"></div>
    
    <!-- 网格背景 -->
    <div class="absolute inset-0 opacity-5" style="background-image: linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px); background-size: 50px 50px;"></div>
  </div>
  
  <!-- 主内容区域 -->
  <main class="relative flex-1 pb-20 overflow-y-auto">
    
    <!-- 测试页面 -->
    <div id="page-test" class="page active flex-col items-center justify-center min-h-screen px-6 py-12">
      <!-- Logo区域 -->
      <div class="text-center mb-14 animate-float relative">
        <!-- 光晕背景 -->
        <div class="absolute inset-0 bg-purple-500/20 blur-3xl rounded-full scale-150"></div>
        
        <div class="relative">
          <div class="text-8xl mb-4 animate-glow">🦅</div>
        </div>
        <h1 class="relative text-4xl font-bold tracking-wider bg-gradient-to-r from-white via-purple-200 to-white bg-clip-text text-transparent">
          醒醒鸦
        </h1>
        <p class="relative text-gray-500 text-sm mt-3 tracking-[0.3em]">XING XING YA</p>
      </div>

      <!-- 精神状态引导语 -->
      <div class="relative mb-12 max-w-xs text-center">
        <p class="text-gray-300 text-lg leading-relaxed">
          在深夜审视自己<br>
          <span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-400">看清最真实的精神状态</span>
        </p>
      </div>

      <!-- 测试卡片 -->
      <div class="relative w-full max-w-sm space-y-4">
        <!-- 快速测试 -->
        <button class="w-full group relative overflow-hidden rounded-2xl p-5 transition-all duration-300 active:scale-[0.98]" style="background: linear-gradient(135deg, rgba(139, 92, 246, 0.3), rgba(59, 130, 246, 0.2)); border: 1px solid rgba(139, 92, 246, 0.4);">
          <!-- 卡片光效 -->
          <div class="absolute inset-0 bg-gradient-to-r from-purple-500/0 via-white/5 to-purple-500/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700"></div>
          
          <div class="relative flex items-center justify-between">
            <div class="flex items-center gap-4">
              <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center shadow-lg shadow-purple-500/30">
                <span class="text-xl">⚡</span>
              </div>
              <div class="text-left">
                <div class="font-semibold text-white">快速精神自检</div>
                <div class="text-gray-400 text-sm">3分钟 · 5道题</div>
              </div>
            </div>
            <div class="w-8 h-8 rounded-full bg-purple-500/30 flex items-center justify-center text-purple-300 group-hover:bg-purple-500 group-hover:text-white transition-all duration-300">
              <span>→</span>
            </div>
          </div>
        </button>

        <!-- 深度测试 -->
        <button class="w-full group relative overflow-hidden rounded-2xl p-5 transition-all duration-300 active:scale-[0.98]" style="background: linear-gradient(135deg, rgba(236, 72, 153, 0.3), rgba(168, 85, 247, 0.2)); border: 1px solid rgba(236, 72, 153, 0.4);">
          <!-- 卡片光效 -->
          <div class="absolute inset-0 bg-gradient-to-r from-pink-500/0 via-white/5 to-pink-500/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700"></div>
          
          <div class="relative flex items-center justify-between">
            <div class="flex items-center gap-4">
              <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-pink-500 to-purple-500 flex items-center justify-center shadow-lg shadow-pink-500/30">
                <span class="text-xl">🔮</span>
              </div>
              <div class="text-left">
                <div class="font-semibold text-white">深度心理分析</div>
                <div class="text-gray-400 text-sm">10分钟 · 15道题</div>
              </div>
            </div>
            <div class="w-8 h-8 rounded-full bg-pink-500/30 flex items-center justify-center text-pink-300 group-hover:bg-pink-500 group-hover:text-white transition-all duration-300">
              <span>→</span>
            </div>
          </div>
        </button>

        <!-- 历史记录 -->
        <button class="w-full py-3 px-4 rounded-xl flex items-center justify-center gap-2 text-gray-500 hover:text-purple-400 transition-colors">
          <span>📋</span>
          <span class="text-sm font-medium">查看测试历史</span>
        </button>
      </div>

      <!-- 底部引言 -->
      <div class="relative mt-16 text-center px-8">
        <p class="text-gray-600 text-xs italic">
          "夜色中，最容易看清自己"
        </p>
      </div>
    </div>

    <!-- 聊天页面 -->
    <div id="page-chat" class="page flex-col h-screen">
      <!-- 聊天头部 -->
      <div class="relative px-4 py-4 flex items-center gap-3 border-b border-white/10" style="background: rgba(0,0,0,0.3); backdrop-filter: blur(20px);">
        <div class="relative">
          <!-- 脉冲光环 -->
          <div class="absolute inset-0 bg-purple-500/30 rounded-full blur-md"></div>
          <div class="relative w-11 h-11 bg-gradient-to-br from-purple-500 to-pink-500 rounded-full flex items-center justify-center shadow-lg shadow-purple-500/30">
            <span class="text-xl">🦅</span>
          </div>
        </div>
        <div>
          <h2 class="font-semibold text-white">小鸦</h2>
          <p class="text-xs text-gray-400 flex items-center gap-1.5">
            <span class="w-1.5 h-1.5 bg-green-400 rounded-full animate-pulse"></span>
            在线 · 随时倾听
          </p>
        </div>
      </div>

      <!-- 聊天消息区域 -->
      <div class="relative flex-1 overflow-y-auto p-4 space-y-4" style="background: linear-gradient(180deg, transparent, rgba(139, 92, 246, 0.05));">
        <!-- AI消息 -->
        <div class="flex gap-3">
          <div class="relative flex-shrink-0">
            <div class="absolute inset-0 bg-purple-500/20 blur-md rounded-full"></div>
            <div class="relative w-9 h-9 bg-gradient-to-br from-purple-500 to-pink-500 rounded-full flex items-center justify-center shadow-lg shadow-purple-500/30">
              <span class="text-sm">🦅</span>
            </div>
          </div>
          <div class="max-w-[78%]">
            <div class="relative overflow-hidden rounded-2xl rounded-tl-sm px-4 py-3" style="background: linear-gradient(135deg, rgba(139, 92, 246, 0.3), rgba(59, 130, 246, 0.2)); border: 1px solid rgba(139, 92, 246, 0.3);">
              <p class="text-gray-200 text-sm leading-relaxed relative z-10">
                你好，我是小鸦 ✨<br><br>
                深夜了，适合和自己对话。<br>
                有什么想聊聊的吗？
              </p>
            </div>
            <span class="text-xs text-gray-500 mt-1.5 block">刚刚</span>
          </div>
        </div>

        <!-- 用户消息 -->
        <div class="flex gap-3 justify-end">
          <div class="max-w-[78%]">
            <div class="bg-gradient-to-r from-purple-600 to-pink-600 text-white rounded-2xl rounded-tr-sm px-4 py-3 shadow-lg shadow-purple-500/20">
              <p class="text-sm leading-relaxed">
                感觉自己每天都在内耗，好累
              </p>
            </div>
            <span class="text-xs text-gray-500 mt-1.5 block text-right">刚刚</span>
          </div>
        </div>

        <!-- AI回复 -->
        <div class="flex gap-3">
          <div class="relative flex-shrink-0">
            <div class="absolute inset-0 bg-purple-500/20 blur-md rounded-full"></div>
            <div class="relative w-9 h-9 bg-gradient-to-br from-purple-500 to-pink-500 rounded-full flex items-center justify-center shadow-lg shadow-purple-500/30">
              <span class="text-sm">🦅</span>
            </div>
          </div>
          <div class="max-w-[78%]">
            <div class="relative overflow-hidden rounded-2xl rounded-tl-sm px-4 py-3" style="background: linear-gradient(135deg, rgba(139, 92, 246, 0.3), rgba(59, 130, 246, 0.2)); border: 1px solid rgba(139, 92, 246, 0.3);">
              <p class="text-gray-200 text-sm leading-relaxed relative z-10">
                内耗，往往是因为想得太多 💭<br><br>
                能具体说说是什么事情让你感到内耗吗？是因为选择、他人评价，还是对未来的不确定？
              </p>
            </div>
            <span class="text-xs text-gray-500 mt-1.5 block">刚刚</span>
          </div>
        </div>

        <!-- 时间分隔线 -->
        <div class="flex items-center gap-4 py-4">
          <div class="flex-1 h-px bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>
          <span class="text-xs text-gray-600">今天 23:42</span>
          <div class="flex-1 h-px bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>
        </div>
      </div>

      <!-- 快捷提示 -->
      <div class="relative px-4 py-3 flex gap-2 overflow-x-auto border-t border-white/10" style="background: rgba(0,0,0,0.3); backdrop-filter: blur(20px);">
        <button class="flex-shrink-0 px-4 py-2 rounded-full text-xs transition-all" style="background: rgba(139, 92, 246, 0.3); border: 1px solid rgba(139, 92, 246, 0.4); color: #c4b5fd;" onmouseover="this.style.background='rgba(139, 92, 246, 0.5)'" onmouseout="this.style.background='rgba(139, 92, 246, 0.3)'">
          工作压力
        </button>
        <button class="flex-shrink-0 px-4 py-2 rounded-full text-xs transition-all" style="background: rgba(236, 72, 153, 0.3); border: 1px solid rgba(236, 72, 153, 0.4); color: #f9a8d4;" onmouseover="this.style.background='rgba(236, 72, 153, 0.5)'" onmouseout="this.style.background='rgba(236, 72, 153, 0.3)'">
          失眠焦虑
        </button>
        <button class="flex-shrink-0 px-4 py-2 rounded-full text-xs transition-all" style="background: rgba(6, 182, 212, 0.3); border: 1px solid rgba(6, 182, 212, 0.4); color: #67e8f9;" onmouseover="this.style.background='rgba(6, 182, 212, 0.5)'" onmouseout="this.style.background='rgba(6, 182, 212, 0.3)'">
          情绪低落
        </button>
        <button class="flex-shrink-0 px-4 py-2 rounded-full text-xs transition-all" style="background: rgba(34, 197, 94, 0.3); border: 1px solid rgba(34, 197, 94, 0.4); color: #86efac;" onmouseout="this.style.background='rgba(34, 197, 94, 0.3)'" onmouseover="this.style.background='rgba(34, 197, 94, 0.5)'">
          人际困扰
        </button>
      </div>

      <!-- 输入区域 -->
      <div class="relative px-4 py-4 border-t border-white/10" style="background: rgba(0,0,0,0.3); backdrop-filter: blur(20px);">
        <div class="flex items-end gap-3">
          <div class="flex-1 rounded-2xl px-4 py-3 flex items-center transition-all" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1);">
            <input type="text" placeholder="说点什么..." class="flex-1 bg-transparent outline-none text-sm text-white placeholder-gray-500">
          </div>
          <button class="w-12 h-12 bg-gradient-to-br from-purple-600 to-pink-600 text-white rounded-full flex items-center justify-center shadow-lg shadow-purple-500/30 hover:shadow-xl hover:scale-105 transition-all active:scale-95">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </main>

  <!-- 底部导航栏 -->
  <nav class="relative fixed bottom-0 left-0 right-0 safe-area-bottom" style="background: rgba(0,0,0,0.6); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1);">
    <!-- 顶部霓虹线 -->
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-px" style="background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.8), transparent);"></div>
    
    <div class="flex justify-around items-center h-16">
      <!-- 测试Tab -->
      <button class="nav-tab flex flex-col items-center justify-center w-1/2 h-full transition-all duration-300 active:scale-95" data-tab="test">
        <div class="tab-icon w-10 h-10 mb-1 flex items-center justify-center rounded-xl transition-all duration-300">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
          </svg>
        </div>
        <span class="tab-text text-xs font-medium tracking-wide transition-colors">测试</span>
      </button>

      <!-- 聊天Tab -->
      <button class="nav-tab flex flex-col items-center justify-center w-1/2 h-full transition-all duration-300 active:scale-95" data-tab="chat">
        <div class="tab-icon w-10 h-10 mb-1 flex items-center justify-center rounded-xl transition-all duration-300 relative">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
          </svg>
          <span class="absolute -top-0.5 -right-0.5 w-3 h-3 bg-gradient-to-br from-purple-500 to-pink-500 rounded-full animate-pulse shadow-lg shadow-purple-500/50"></span>
        </div>
        <span class="tab-text text-xs font-medium tracking-wide transition-colors">聊天</span>
      </button>
    </div>
  </nav>

  <script>
    // Tab切换逻辑
    const tabs = document.querySelectorAll('.nav-tab');
    const pages = document.querySelectorAll('.page');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const targetId = tab.dataset.tab;

        // 更新Tab样式
        tabs.forEach(t => {
          t.classList.remove('text-purple-400');
          t.classList.add('text-gray-500');
          const icon = t.querySelector('.tab-icon');
          icon.classList.remove('bg-gradient-to-br', 'from-purple-500', 'to-pink-500', 'text-white', 'shadow-lg');
          const text = t.querySelector('.tab-text');
          text.classList.remove('text-white');
          text.classList.add('text-gray-500');
        });
        
        tab.classList.remove('text-gray-500');
        tab.classList.add('text-purple-400');
        const clickedIcon = tab.querySelector('.tab-icon');
        clickedIcon.classList.add('bg-gradient-to-br', 'from-purple-500', 'to-pink-500', 'text-white', 'shadow-lg', 'shadow-purple-500/30');
        const clickedText = tab.querySelector('.tab-text');
        clickedText.classList.remove('text-gray-500');
        clickedText.classList.add('text-white');

        // 切换页面
        pages.forEach(page => {
          page.classList.remove('active');
        });
        document.getElementById(`page-${targetId}`).classList.add('active');
      });
    });

    // 默认激活测试Tab
    document.querySelector('[data-tab="test"]').click();
  </script>

  <style>
    .safe-area-bottom {
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
  </style>
</body>
</html>
