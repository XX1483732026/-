<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>醒醒鸦 · 精神状态自检</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0d0d0d 0%, #1a1a2e 50%, #2d2d44 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .start-page {
            text-align: center;
            animation: fadeIn 0.8s ease;
        }

        .logo {
            font-size: 64px;
            margin-bottom: 16px;
            animation: crowNod 3s ease-in-out infinite;
        }

        @keyframes crowNod {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }

        .main-title {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #8b8b8b, #d4d4d4, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 16px;
            color: #8892b0;
            margin-bottom: 40px;
        }

        .start-btn {
            background: linear-gradient(135deg, #4a4a4a, #2d2d2d);
            border: 2px solid #666;
            padding: 16px 48px;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(100, 100, 100, 0.3);
            border-color: #888;
        }

        .chat-entry-btn {
            display: inline-block;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 12px 32px;
            font-size: 16px;
            font-weight: 500;
            color: #ccd6f6;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            margin-top: 16px;
        }

        .chat-entry-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
            color: #fff;
            transform: translateY(-2px);
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(100, 100, 100, 0.3);
            border-color: #888;
        }

        .features {
            margin-top: 50px;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .feature {
            text-align: center;
        }

        .feature-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .feature-text {
            font-size: 12px;
            color: #8892b0;
        }

        .quiz-page {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            height: 6px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #666, #999, #ccc);
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .question-counter {
            text-align: center;
            font-size: 14px;
            color: #8892b0;
            margin-bottom: 20px;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .question-text {
            font-size: 18px;
            font-weight: 500;
            line-height: 1.6;
            margin-bottom: 30px;
            text-align: center;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 16px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 15px;
            text-align: center;
        }

        .option:hover {
            background: rgba(100, 100, 100, 0.3);
            border-color: #888;
            transform: translateX(5px);
        }

        .option.selected {
            background: linear-gradient(135deg, rgba(100, 100, 100, 0.4), rgba(150, 150, 150, 0.3));
            border-color: #aaa;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 24px;
            gap: 12px;
        }

        .nav-btn {
            flex: 1;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-btn.prev {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #8892b0;
        }

        .nav-btn.prev:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        .nav-btn.prev:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .nav-btn.submit {
            background: linear-gradient(135deg, #555, #333);
            border: 2px solid #666;
            color: #fff;
        }

        .nav-btn.submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(100, 100, 100, 0.3);
        }

        .result-page {
            display: none;
            text-align: center;
            animation: fadeIn 0.8s ease;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 40px 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        .result-emoji {
            font-size: 72px;
            margin-bottom: 16px;
            animation: crowBounce 2s ease-in-out infinite;
        }

        @keyframes crowBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .result-type {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #fff;
            background: linear-gradient(90deg, #aaa, #ddd, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 备用：如果渐变文字不支持，显示白色 */
        @supports not (-webkit-background-clip: text) {
            .result-type {
                -webkit-text-fill-color: #fff;
                color: #fff;
            }
        }

        .result-desc {
            font-size: 15px;
            line-height: 1.8;
            color: #ccd6f6;
            margin-bottom: 24px;
        }

        .score-section {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
            margin-bottom: 20px;
        }

        .score-label {
            font-size: 12px;
            color: #8892b0;
            margin-bottom: 8px;
        }

        .score-value {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
        }

        .score-zone {
            font-size: 14px;
            color: #8892b0;
            margin-top: 4px;
        }

        .advice-section {
            background: rgba(100, 100, 100, 0.15);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .advice-title {
            font-size: 14px;
            font-weight: 600;
            color: #bbb;
            margin-bottom: 8px;
        }

        .advice-text {
            font-size: 14px;
            color: #ccd6f6;
            line-height: 1.6;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .share-btn {
            background: linear-gradient(135deg, #555, #333);
            border: 2px solid #666;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .share-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(100, 100, 100, 0.3);
        }

        .share-options {
            display: none;
            flex-direction: column;
            gap: 10px;
            margin-top: 12px;
            animation: slideUp 0.3s ease;
        }

        .share-options.show {
            display: flex;
        }

        .share-option-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 20px;
            font-size: 14px;
            color: #fff;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .share-option-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .retry-btn {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 12px 32px;
            font-size: 14px;
            color: #8892b0;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .retry-btn:hover {
            border-color: rgba(255, 255, 255, 0.4);
            color: #fff;
        }

        .chat-entry {
            margin-top: 20px;
        }

        .chat-link {
            display: inline-block;
            background: linear-gradient(135deg, #555, #333);
            border: 2px solid #666;
            padding: 10px 24px;
            border-radius: 24px;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .chat-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(100, 100, 100, 0.3);
        }

        .footer-tip {
            margin-top: 30px;
            font-size: 12px;
            color: #5a6a8a;
        }

        .image-preview-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }

        .image-preview-overlay.show {
            display: flex;
        }

        .image-preview-container {
            max-width: 400px;
            width: 100%;
            background: #1a1a2e;
            border-radius: 16px;
            overflow: hidden;
        }

        .image-preview-container img {
            width: 100%;
            display: block;
        }

        .image-preview-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            width: 100%;
            max-width: 400px;
        }

        .image-preview-actions button {
            flex: 1;
            padding: 12px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .download-btn {
            background: linear-gradient(135deg, #555, #333);
            border: 2px solid #666;
            color: #fff;
        }

        .close-preview-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #8892b0;
        }

        .result-image-container {
            position: fixed;
            left: -9999px;
            top: 0;
            width: 400px;
            background: linear-gradient(135deg, #0d0d0d 0%, #1a1a2e 50%, #2d2d44 100%);
            padding: 40px 30px;
            font-family: 'Noto Sans SC', sans-serif;
            color: #fff;
            text-align: center;
        }

        .result-image-container .img-emoji {
            font-size: 80px;
            margin-bottom: 16px;
        }

        .result-image-container .img-type {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #aaa, #ddd, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .result-image-container .img-desc {
            font-size: 14px;
            line-height: 1.8;
            color: #ccd6f6;
            margin-bottom: 24px;
            padding: 0 10px;
        }

        .result-image-container .score-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .result-image-container .score-num {
            font-size: 28px;
            font-weight: 700;
            color: #bbb;
        }

        .result-image-container .score-zone-text {
            font-size: 14px;
            color: #8892b0;
            margin-top: 4px;
        }

        .result-image-container .advice-box {
            background: rgba(100, 100, 100, 0.15);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 24px;
        }

        .result-image-container .advice-title-text {
            font-size: 13px;
            font-weight: 600;
            color: #bbb;
            margin-bottom: 6px;
        }

        .result-image-container .advice-content {
            font-size: 13px;
            color: #ccd6f6;
        }

        .result-image-container .img-footer {
            font-size: 12px;
            color: #5a6a8a;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 16px;
        }

        .result-image-container .logo-text {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(90deg, #aaa, #ddd, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 开始页面 -->
        <div class="start-page" id="startPage">
            <div class="logo">🦅</div>
            <h1 class="main-title">醒醒鸦</h1>
            <p class="subtitle">嘎 —— 别装了，测测你现在的真实状态</p>
            <button class="start-btn" id="startBtn">开始测试</button>
            <a href="chat.html" class="chat-entry-btn">和小鸦聊天 💬</a>
            <div class="features">
                <div class="feature">
                    <div class="feature-icon">⚡</div>
                    <div class="feature-text">2分钟</div>
                </div>
                <div class="feature">
                    <div class="feature-icon">📋</div>
                    <div class="feature-text">20道题</div>
                </div>
                <div class="feature">
                    <div class="feature-icon">🦅</div>
                    <div class="feature-text">嘎嘎预警</div>
                </div>
            </div>
        </div>

        <!-- 答题页面 -->
        <div class="quiz-page" id="quizPage">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="question-counter" id="questionCounter">第 1 题 / 共 20 题</div>
            <div class="question-card">
                <div class="question-text" id="questionText"></div>
                <div class="options" id="optionsContainer"></div>
                <div class="nav-buttons">
                    <button class="nav-btn prev" id="prevBtn">← 上一题</button>
                </div>
            </div>
        </div>

        <!-- 结果页面 -->
        <div class="result-page" id="resultPage">
            <div class="result-card">
                <div class="result-emoji" id="resultEmoji"></div>
                <div class="result-type" id="resultType"></div>
                <div class="result-desc" id="resultDesc"></div>
                <div class="score-section">
                    <div class="score-label">精神状态指数</div>
                    <div class="score-value" id="scoreValue"></div>
                    <div class="score-zone" id="scoreZone"></div>
                </div>
                <div class="advice-section">
                    <div class="advice-title">🦅 鸦鸦有话说</div>
                    <div class="advice-text" id="adviceText"></div>
                </div>
            </div>
            <div class="action-buttons">
                <button class="share-btn" id="shareBtn">📤 分享测试结果</button>
                <div class="share-options" id="shareOptions">
                    <button class="share-option-btn" id="copyTextBtn">📋 复制文字</button>
                    <button class="share-option-btn" id="downloadImgBtn">🖼️ 下载图片</button>
                </div>
                <button class="retry-btn" id="retryBtn">🔄 重新测试</button>
            </div>
            <div class="chat-entry"><a href="chat.html" class="chat-link">🦅 和小鸦聊聊</a></div><div class="footer-tip">关注「醒醒鸦」公众号 · 嘎嘎陪你每一天</div>
        </div>
    </div>

    <!-- 图片预览弹窗 -->
    <div class="image-preview-overlay" id="imagePreviewOverlay">
        <div class="image-preview-container" id="imagePreviewContainer"></div>
        <div class="image-preview-actions">
            <button class="download-btn" id="confirmDownloadBtn">💾 保存图片</button>
            <button class="close-preview-btn" id="closePreviewBtn">关闭</button>
        </div>
    </div>

    <!-- 用于生成图片的隐藏容器 -->
    <div class="result-image-container" id="resultImageContainer">
        <div class="img-emoji" id="imgEmoji"></div>
        <div class="img-type" id="imgType"></div>
        <div class="img-desc" id="imgDesc"></div>
        <div class="score-box">
            <div class="score-num" id="imgScore"></div>
            <div class="score-zone-text" id="imgZone"></div>
        </div>
        <div class="advice-box">
            <div class="advice-title-text">🦅 鸦鸦有话说</div>
            <div class="advice-content" id="imgAdvice"></div>
        </div>
        <div class="img-footer">
            <div class="logo-text">醒醒鸦</div>
            <div style="margin-top: 6px;">xingxingya.com</div>
        </div>
    </div>

    <!-- html2canvas 库 -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    
    <script>
        // ========== 数据定义 ==========
        var questions = [
            { text: "闹钟响了，你的第一反应是？", options: [{ text: "立刻起床，迎接新的一天 ✨", score: 3 }, { text: "再躺5分钟...就5分钟... 😴", score: 2 }, { text: "闹钟？我早就醒了，根本没睡 🌚", score: 1 }] },
            { text: "周末有人约你出门，你的内心活动是？", options: [{ text: "好耶！出门透透气！🎉", score: 3 }, { text: "看情况吧，心情好再去 🤔", score: 2 }, { text: "别吧...让我再躺会儿...🛋️", score: 1 }] },
            { text: "你的手机屏幕使用时间大概是？", options: [{ text: "4小时以内，我很克制 📱", score: 3 }, { text: "4-8小时，正常水平吧 😐", score: 2 }, { text: "不敢看，看了会焦虑 💀", score: 1 }] },
            { text: "最近一次感到「活着真好」是什么时候？", options: [{ text: "今天/最近几天 ☀️", score: 3 }, { text: "好像...有一阵子了 🌥️", score: 2 }, { text: "想不起来了 🌫️", score: 1 }] },
            { text: "如果可以用一个词形容你现在的状态？", options: [{ text: "活力满满 🔋", score: 3 }, { text: "还能撑 💪", score: 2 }, { text: "行尸走肉 🧟", score: 1 }] },
            { text: "朋友群里有人发消息，你通常会？", options: [{ text: "积极回复，气氛担当 💬", score: 3 }, { text: "看心情，偶尔回一下 👀", score: 2 }, { text: "已读不回是常态 🔇", score: 1 }] },
            { text: "有人请你帮忙做一件麻烦的事，你会？", options: [{ text: "能帮就帮，朋友嘛 🤝", score: 3 }, { text: "先评估一下值不值得 🧮", score: 2 }, { text: "表面答应，内心崩溃 😱", score: 1 }] },
            { text: "你觉得自己在朋友眼中是？", options: [{ text: "靠谱的、能扛事的 💪", score: 3 }, { text: "存在感不太强的 👻", score: 2 }, { text: "那个「下次一定」的人 🙃", score: 1 }] },
            { text: "最近一次主动联系朋友是什么时候？", options: [{ text: "这几天刚聊过 📞", score: 3 }, { text: "一两周前吧 📅", score: 2 }, { text: "让我想想...好像很久了 📆", score: 1 }] },
            { text: "有人问「最近怎么样」，你的真实回答是？", options: [{ text: "挺好的呀！😊", score: 3 }, { text: "就那样吧，还能过 😐", score: 2 }, { text: "哈哈（没有然后了）😅", score: 1 }] },
            { text: "周日晚上，想到明天要上班/上学，你的心情是？", options: [{ text: "期待新的一周！🌟", score: 3 }, { text: "正常，习惯了 📋", score: 2 }, { text: "开始胃痛/焦虑/想辞职退学 😣", score: 1 }] },

        // ========== 状态变量 ==========
        var currentQuestion = 0;
        var totalScore = 0;
        var answers = [];
        var currentResult = null;
        var generatedImageBlob = null;
        var isTransitioning = false; // 防止重复点击

        // ========== DOM 元素获取 ==========
        var startPage = document.getElementById('startPage');
        var quizPage = document.getElementById('quizPage');
        var resultPage = document.getElementById('resultPage');
        var startBtn = document.getElementById('startBtn');
        var prevBtn = document.getElementById('prevBtn');
        var shareBtn = document.getElementById('shareBtn');
        var shareOptions = document.getElementById('shareOptions');
        var copyTextBtn = document.getElementById('copyTextBtn');
        var downloadImgBtn = document.getElementById('downloadImgBtn');
        var retryBtn = document.getElementById('retryBtn');
        var progressFill = document.getElementById('progressFill');
        var questionCounter = document.getElementById('questionCounter');
        var questionText = document.getElementById('questionText');
        var optionsContainer = document.getElementById('optionsContainer');
        var imagePreviewOverlay = document.getElementById('imagePreviewOverlay');
        var imagePreviewContainer = document.getElementById('imagePreviewContainer');
        var confirmDownloadBtn = document.getElementById('confirmDownloadBtn');
        var closePreviewBtn = document.getElementById('closePreviewBtn');

        // ========== 核心函数 ==========
        function startQuiz() {
            startPage.classList.add('hidden');
            quizPage.style.display = 'block';
            currentQuestion = 0;
            totalScore = 0;
            answers = [];
            isTransitioning = false;
            showQuestion();
        }

        function showQuestion() {
            var question = questions[currentQuestion];
            questionCounter.textContent = '第 ' + (currentQuestion + 1) + ' 题 / 共 ' + questions.length + ' 题';
            progressFill.style.width = ((currentQuestion) / questions.length * 100) + '%';
            questionText.textContent = question.text;

            optionsContainer.innerHTML = '';

            for (var i = 0; i < question.options.length; i++) {
                (function(index) {
                    var option = question.options[index];
                    var optionEl = document.createElement('div');
                    optionEl.className = 'option';
                    if (answers[currentQuestion] !== undefined && answers[currentQuestion].answer === index) {
                        optionEl.classList.add('selected');
                    }
                    optionEl.textContent = option.text;
                    optionEl.onclick = function() {
                        selectOption(index, option.score);
                    };
                    optionsContainer.appendChild(optionEl);
                })(i);
            }

            updateNavButtons();
        }

        function updateNavButtons() {
            prevBtn.disabled = currentQuestion === 0;
        }

        function selectOption(index, score) {
            // 防止重复点击
            if (isTransitioning) {
                return;
            }
            
            var options = document.querySelectorAll('.option');
            for (var i = 0; i < options.length; i++) {
                options[i].classList.remove('selected');
            }
            options[index].classList.add('selected');
            
            // 记录答案
            answers[currentQuestion] = { answer: index, score: score };
            console.log('第' + (currentQuestion + 1) + '题答案已记录：', answers[currentQuestion]);
            
            // 更新按钮状态
            updateNavButtons();
            
            // 判断是否是最后一题
            if (currentQuestion === questions.length - 1) {
                // 最后一题答完，自动跳结果页
                isTransitioning = true;
                setTimeout(function() {
                    showResult();
                    isTransitioning = false;
                }, 400);
            } else {
                // 非最后一题，自动跳转下一题
                isTransitioning = true;
                setTimeout(function() {
                    currentQuestion++;
                    showQuestion();
                    isTransitioning = false;
                }, 400);
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion();
            }
        }

        function showResult() {
            try {
                // 先检查是否所有题目都答了
                if (answers.length < questions.length) {
                    console.log('答案不完整，当前数量：' + answers.length);
                    // 补齐未答的题目（默认给2分）
                    for (var i = answers.length; i < questions.length; i++) {
                        answers[i] = { answer: 0, score: 2 };
                    }
                }
                
                quizPage.style.display = 'none';
                resultPage.style.display = 'block';
                progressFill.style.width = '100%';

                // 计算总分
                totalScore = 0;
                for (var i = 0; i < answers.length; i++) {
                    if (answers[i] && answers[i].score !== undefined) {
                        totalScore += answers[i].score;
                    }
                }
                
                console.log('答题完成，总分：' + totalScore + '，答案数量：' + answers.length);

                // 确定分区
                var zone, zoneText, resultPool;
                if (totalScore >= 51) {
                    zone = 'awake';
                    zoneText = '🦅 清醒翱翔区';
                    resultPool = results.awake;
                } else if (totalScore >= 36) {
                    zone = 'blurry';
                    zoneText = '🌫️ 迷雾盘旋区';
                    resultPool = results.blurry;
                } else {
                    zone = 'asleep';
                    zoneText = '🌑 深渊蛰伏区';
                    resultPool = results.asleep;
                }
                
                console.log('分区：' + zone + '，结果池数量：' + resultPool.length);

                // 随机选择一个结果
                var resultIndex = Math.floor(Math.random() * resultPool.length);
                currentResult = resultPool[resultIndex];
                
                console.log('选中结果：', currentResult);

                // 填充结果页面
                document.getElementById('resultEmoji').innerHTML = currentResult.emoji;
                document.getElementById('resultType').innerHTML = currentResult.type;
                document.getElementById('resultDesc').innerHTML = currentResult.desc;
                document.getElementById('scoreValue').innerHTML = totalScore + ' / 60';
                document.getElementById('scoreZone').innerHTML = zoneText;
                document.getElementById('adviceText').innerHTML = currentResult.advice;

                // 填充图片容器
                document.getElementById('imgEmoji').innerHTML = currentResult.emoji;
                document.getElementById('imgType').innerHTML = currentResult.type;
                document.getElementById('imgDesc').innerHTML = currentResult.desc;
                document.getElementById('imgScore').innerHTML = totalScore + ' / 60';
                document.getElementById('imgZone').innerHTML = zoneText;
                document.getElementById('imgAdvice').innerHTML = currentResult.advice;
                
                console.log('结果页面填充完成');
            } catch (error) {
                console.error('显示结果时出错：', error);
                alert('显示结果时出错：' + error.message);
            }
        }

        function toggleShareOptions() {
            shareOptions.classList.toggle('show');
        }

        function copyText() {
            var shareText = '我测出来是「' + currentResult.emoji + ' ' + currentResult.type + '」！\n精神状态指数：' + totalScore + ' / 60\n' + document.getElementById('scoreZone').textContent + '\n\n嘎 —— 来测测你是什么鸦！\nxingxingya.com';

            if (navigator.clipboard) {
                navigator.clipboard.writeText(shareText).then(function() {
                    alert('✅ 已复制到剪贴板！\n嘎嘎 ~ 粘贴到朋友圈分享吧~');
                }).catch(function() {
                    fallbackCopy(shareText);
                });
            } else {
                fallbackCopy(shareText);
            }
        }

        function fallbackCopy(text) {
            var textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            alert('✅ 已复制到剪贴板！\n嘎嘎 ~ 粘贴到朋友圈分享吧~');
        }

        function downloadImage() {
            shareOptions.classList.remove('show');
            var container = document.getElementById('resultImageContainer');

            if (typeof html2canvas !== 'undefined') {
                html2canvas(container, {
                    backgroundColor: null,
                    scale: 2,
                    useCORS: true
                }).then(function(canvas) {
                    canvas.toBlob(function(blob) {
                        generatedImageBlob = blob;
                        var img = document.createElement('img');
                        img.src = URL.createObjectURL(blob);
                        imagePreviewContainer.innerHTML = '';
                        imagePreviewContainer.appendChild(img);
                        imagePreviewOverlay.classList.add('show');
                    }, 'image/png');
                }).catch(function(error) {
                    console.error('生成图片失败:', error);
                    alert('生成图片失败，请重试');
                });
            } else {
                alert('图片生成库加载失败，请刷新页面重试');
            }
        }

        function confirmDownload() {
            if (generatedImageBlob) {
                var link = document.createElement('a');
                link.href = URL.createObjectURL(generatedImageBlob);
                link.download = '醒醒鸦-' + currentResult.type + '.png';
                link.click();
                closePreview();
            }
        }

        function closePreview() {
            imagePreviewOverlay.classList.remove('show');
        }

        function retryQuiz() {
            resultPage.style.display = 'none';
            startPage.classList.remove('hidden');
            shareOptions.classList.remove('show');
            currentQuestion = 0;
            totalScore = 0;
            answers = [];
            currentResult = null;
            generatedImageBlob = null;
            isTransitioning = false;
        }

        // ========== 事件绑定 ==========
        startBtn.onclick = startQuiz;
        prevBtn.onclick = prevQuestion;
        shareBtn.onclick = toggleShareOptions;
        copyTextBtn.onclick = copyText;
        downloadImgBtn.onclick = downloadImage;
        retryBtn.onclick = retryQuiz;
        confirmDownloadBtn.onclick = confirmDownload;
        closePreviewBtn.onclick = closePreview;

        console.log('醒醒鸦测试已加载完成 · 嘎嘎 · 云电脑版');
    </script>
