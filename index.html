    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script>
        // ========== 20道趣味测试题目（3选项版）==========
        // A=3分, B=2分, C=1分 | 每维度5题,最高15分
        // 分档: 高(13-15) / 中(9-12) / 低(5-8)
        
        var questions = [
            // ⚡ 电量维度 Q1-Q5
            { dimension: '电量', text: "周末早上闹钟响了，你的第一反应是？", options: [
                { text: "弹射起床！☀️ 新的一天冲冲冲", score: 3 },
                { text: "再躺5分钟...就5分钟 😴", score: 2 },
                { text: "闹钟？我早醒了，根本没睡 🌚", score: 1 }
            ]},
            { dimension: '电量', text: "终于完成一件超难的事，你现在的状态是？", options: [
                { text: "我还能再战三百回合！🔥", score: 3 },
                { text: "有点累，但成就感满满 ✨", score: 2 },
                { text: "我是谁我在哪，脑子已下线 🧠💨", score: 1 }
            ]},
            { dimension: '电量', text: "如果每天多1小时，你会拿来干嘛？", options: [
                { text: "卷死别人 / 做想做的事 💪", score: 3 },
                { text: "补觉 or 吃顿好的 🍜", score: 2 },
                { text: "躺着发呆，时间对我没意义 🫠", score: 1 }
            ]},
            { dimension: '电量', text: "你现在对咖啡/续命水的依赖程度？", options: [
                { text: "不需要，本人体质特殊 ⚡", score: 3 },
                { text: "偶尔来一杯，但不硬依赖 ☕", score: 2 },
                { text: "喝了也没用，人已经麻了 💀", score: 1 }
            ]},
            { dimension: '电量', text: "回想过去一个月，"感觉自己超能打"的天数有？", options: [
                { text: "超过15天，我状态一直在线 💯", score: 3 },
                { text: "7-15天，起起伏伏还凑合 📊", score: 2 },
                { text: "不到7天，每天都在渡劫 🚶💨", score: 1 }
            ]},

            document.getElementById('imgType').innerHTML = yageName;
            var imgZoneEl = document.getElementById('imgZone');
            imgZoneEl.textContent = currentResult.zone;
            imgZoneEl.className = 'img-zone ' + currentResult.zone;
            document.getElementById('imgDesc').innerHTML = currentResult.desc.replace(/\n/g, '<br>');
            document.getElementById('imgAdvice').innerHTML = currentResult.advice;
            var imgDimsContainer = document.getElementById('imgDims');
            imgDimsContainer.innerHTML = '';
            for (var dim in dimensionScores) {
                var lv = levels[dim];
                var item = document.createElement('div');
                item.className = 'img-dim-item ' + lv;
                item.innerHTML = '<div class="dim-name">' + dim + '</div><div class="dim-value">' + dimensionScores[dim] + '</div>';
                imgDimsContainer.appendChild(item);
            }
            document.getElementById('imgSuitableContent').innerHTML = currentResult.suitable.replace(/、/g, ' · ');
            clearProgress();
        }

        function toggleShareOptions() { shareOptions.classList.toggle('show'); }

        function copyText() {
            var dimText = '';
            for (var dim in dimensionScores) { dimText += dim + ': ' + dimensionScores[dim] + '/15 (' + (levels[dim] === '高' ? '充沛' : levels[dim] === '中' ? '平稳' : '告急') + ') '; }
            var shareText = '我测出来是「' + currentResult.type + '」！\n' + dimText + '\n\n' + currentResult.zone + '\n\n' + currentResult.advice + '\n\n嘎 —— 来测测你是什么鸦！\nxingxingya.com';
            if (navigator.clipboard) navigator.clipboard.writeText(shareText).then(function() { alert('✅ 已复制到剪贴板！\n嘎嘎 ~ 粘贴到朋友圈分享吧~'); }).catch(function() { fallbackCopy(shareText); });
            else fallbackCopy(shareText);
        }

        function fallbackCopy(text) { var ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); alert('✅ 已复制到剪贴板！'); }

        function downloadImage() {
            shareOptions.classList.remove('show');
            var container = document.getElementById('resultImageContainer');
            if (typeof html2canvas !== 'undefined') {
                html2canvas(container, { backgroundColor: null, scale: 2, useCORS: true }).then(function(canvas) {
                    canvas.toBlob(function(blob) {
                        generatedImageBlob = blob;
                        var img = document.createElement('img');
                        img.src = URL.createObjectURL(blob);
                        imagePreviewContainer.innerHTML = '';
                        imagePreviewContainer.appendChild(img);
                        imagePreviewOverlay.classList.add('show');
                    }, 'image/png');
                });
            }
        }

        function confirmDownload() { if (generatedImageBlob) { var link = document.createElement('a'); link.href = URL.createObjectURL(generatedImageBlob); link.download = '醒醒鸦-' + currentResult.type + '.png'; link.click(); closePreview(); } }
        function closePreview() { imagePreviewOverlay.classList.remove('show'); }

        function retryQuiz() {
            resultPage.style.display = 'none'; resultPage.classList.remove('show');
            startPage.classList.remove('hidden'); shareOptions.classList.remove('show');
            currentQuestion = 0; answers = []; currentResult = null;
            dimensionScores = { '电量': 0, '情绪': 0, '行动': 0, '连接': 0 };
            generatedImageBlob = null; isTransitioning = false;
            clearProgress();
        }

        // 事件绑定
        startBtn.onclick = startQuiz;
        prevBtn.onclick = prevQuestion;
        shareBtn.onclick = toggleShareOptions;
        copyTextBtn.onclick = copyText;
        downloadImgBtn.onclick = downloadImage;
        retryBtn.onclick = retryQuiz;
        confirmDownloadBtn.onclick = confirmDownload;
        closePreviewBtn.onclick = closePreview;

        // 跟小鸦聊聊按钮
        document.getElementById('chatBtn').onclick = function() {
            if (currentResult) {
                try { localStorage.setItem('xingxingya_test_result', JSON.stringify({ yageName: currentResult.type, zone: currentResult.zone, dimensionScores: dimensionScores, advice: currentResult.advice, desc: currentResult.desc })); } catch(e) {}
            }
            window.location.href = 'chat.html';
        };

        console.log('醒醒鸦测试已加载完成 · 嘎嘎 (v3.0 趣味3选项版)');
    </script>

    <div id="loadingOverlay" class="loading-overlay"><span class="crow-icon">🪶</span><p>小鸦在努力思考中...</p></div>
    <button id="backToTop" class="back-to-top">↑</button>
    <script>
        var backToTopBtn = document.getElementById('backToTop');
        window.addEventListener('scroll', function() { backToTopBtn.classList.toggle('visible', window.scrollY > 300); });
        backToTopBtn.addEventListener('click', function() { window.scrollTo({ top: 0, behavior: 'smooth' }); });
    </script>
</body>
</html>
