<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访问统计 · 醒醒鸦</title>
    <meta name="robots" content="index, follow">
    <meta name="description" content="醒醒鸦访问统计数据 - 查看测试人数、鸦格分布等有趣数据">
    <meta name="keywords" content="精神状态测试,鸦格分布,醒醒鸦统计">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://xingxingya.com/stats.html">
    <meta property="og:title" content="访问统计 · 醒醒鸦">
    <meta property="og:description" content="查看醒醒鸦社区的趣味统计数据">
    <meta property="og:image" content="https://xingxingya.com/mengya.webp">
    <meta property="og:site_name" content="醒醒鸦">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="访问统计 · 醒醒鸦">
    <meta name="twitter:description" content="查看醒醒鸦社区的趣味统计数据">
    <meta name="twitter:image" content="https://xingxingya.com/mengya.webp">
    <link rel="canonical" href="https://xingxingya.com/stats.html">
    <link rel="icon" type="image/png" href="mengya.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0d0d0d 0%, #1a1a2e 50%, #2d2d44 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .login-box h1 { font-size: 24px; margin-bottom: 30px; }
        .login-box input {
            width: 100%;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .login-box button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #4a9eff, #6c5ce7);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }
        .login-box button:hover { opacity: 0.9; }
        .error { color: #ff6b6b; margin-top: 10px; font-size: 14px; }
        
        .stats-container { max-width: 1400px; margin: 0 auto; display: none; }
        .stats-header { text-align: center; padding: 40px 0; }
        .stats-header h1 { font-size: 32px; margin-bottom: 10px; }
        .stats-header p { color: #8892b0; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-card h3 { font-size: 13px; color: #8892b0; margin-bottom: 8px; text-transform: uppercase; }
        .stat-card .value { font-size: 28px; font-weight: bold; }
        .stat-card .value.small { font-size: 20px; }
        .stat-card .sub { font-size: 12px; color: #8892b0; margin-top: 4px; }
        .stat-card .change { font-size: 12px; margin-top: 5px; }
        .stat-card .change.up { color: #4ade80; }
        .stat-card .change.down { color: #f87171; }
        
        .chart-section { margin-bottom: 30px; }
        .chart-section h2 { font-size: 18px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .chart-container {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .bar-chart { display: flex; flex-direction: column; gap: 8px; }
        .bar-row { display: flex; align-items: center; gap: 12px; }
        .bar-label { width: 100px; font-size: 13px; color: #8892b0; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .bar-track { flex: 1; height: 20px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #4a9eff, #6c5ce7); border-radius: 10px; transition: width 0.3s; }
        .bar-value { width: 50px; font-size: 13px; text-align: right; }
        
        .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) {
            .grid-2col { grid-template-columns: 1fr; }
        }
        
        .pie-chart { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; }
        .pie-item { display: flex; align-items: center; gap: 8px; }
        .pie-dot { width: 12px; height: 12px; border-radius: 50%; }
        .pie-label { font-size: 13px; color: #8892b0; }
        .pie-value { font-size: 14px; font-weight: bold; }
        
        .refresh-btn {
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: transparent;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
        }
        .refresh-btn:hover { background: rgba(255,255,255,0.1); }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab {
            padding: 10px 20px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: transparent;
            color: #8892b0;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .tab.active { background: rgba(74,158,255,0.2); border-color: #4a9eff; color: #fff; }
        .tab:hover { background: rgba(255,255,255,0.1); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .loading { text-align: center; padding: 40px; color: #8892b0; }
        
        .no-data { text-align: center; padding: 40px; color: #8892b0; }
        
        .scroll-indicator {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        .scroll-indicator span {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            font-size: 13px;
        }
        .scroll-indicator span span { display: block; font-size: 18px; font-weight: bold; color: #4a9eff; }
    </style>
</head>
<body>
    <div class="login-box" id="loginBox">
        <h1>🦅 访问统计</h1>
        <input type="password" id="password" placeholder="输入密码查看统计" onkeypress="if(event.key==='Enter')login()">
        <button onclick="login()">查看数据</button>
        <div class="error" id="error"></div>
    </div>
    
    <div class="stats-container" id="statsContainer">
        <div class="stats-header">
            <h1>🦅 醒醒鸦访问统计</h1>
            <p id="updateTime">数据加载中...</p>
            <button class="refresh-btn" onclick="loadStats()" style="margin-top:15px;">🔄 刷新数据</button>
        </div>
        
        <!-- 核心指标 -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>今日访问量</h3>
                <div class="value" id="todayPv">-</div>
                <div class="sub" id="todayUv">UV: -</div>
            </div>
            <div class="stat-card">
                <h3>总访问量</h3>
                <div class="value" id="totalPv">-</div>
                <div class="sub" id="totalUv">总UV: -</div>
            </div>
            <div class="stat-card">
                <h3>平均停留</h3>
                <div class="value small" id="avgTime">-</div>
                <div class="sub" id="timeCount">记录数: -</div>
            </div>
            <div class="stat-card">
                <h3>页面浏览</h3>
                <div class="value small" id="pageViews">-</div>
                <div class="sub">PV/UV</div>
            </div>
        </div>
        
        <!-- 标签页 -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('overview')">📊 概览</button>
            <button class="tab" onclick="switchTab('sources')">🔍 来源分析</button>
            <button class="tab" onclick="switchTab('engagement')">⏱️ 用户参与</button>
            <button class="tab" onclick="switchTab('events')">🎯 事件追踪</button>
        </div>
        
        <!-- 概览 -->
        <div class="tab-content active" id="tab-overview">
            <div class="grid-2col">
                <div class="chart-section">
                    <h2>📈 近7天访问趋势</h2>
                    <div class="chart-container">
                        <div class="bar-chart" id="trendChart"></div>
                    </div>
                </div>
                <div class="chart-section">
                    <h2>📱 设备分布</h2>
                    <div class="chart-container">
                        <div class="pie-chart" id="deviceChart"></div>
                    </div>
                </div>
            </div>
            
            <div class="grid-2col">
                <div class="chart-section">
                    <h2>🦊 浏览器分布</h2>
                    <div class="chart-container">
                        <div class="bar-chart" id="browserChart"></div>
                    </div>
                </div>
                <div class="chart-section">
                    <h2>📄 热门页面</h2>
                    <div class="chart-container">
                        <div class="bar-chart" id="pageChart"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 来源分析 -->
        <div class="tab-content" id="tab-sources">
            <div class="grid-2col">
                <div class="chart-section">
                    <h2>🌐 流量来源 TOP10</h2>
                    <div class="chart-container">
                        <div class="bar-chart" id="sourceChart"></div>
                    </div>
                </div>
                <div class="chart-section">
                    <h2>📢 流量类型分布</h2>
                    <div class="chart-container">
                        <div class="pie-chart" id="mediumChart"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 用户参与 -->
        <div class="tab-content" id="tab-engagement">
            <div class="chart-section">
                <h2>📜 滚动深度分布</h2>
                <div class="chart-container">
                    <div class="scroll-indicator" id="scrollIndicator"></div>
                    <p style="font-size:12px;color:#8892b0;margin-top:10px;">滚动深度表示用户浏览页面内容的程度，76-100%表示用户完整浏览</p>
                </div>
            </div>
            
            <div class="chart-section">
                <h2>⏱️ 停留时间分布</h2>
                <div class="chart-container">
                    <div class="bar-chart" id="timeDistChart"></div>
                    <p style="font-size:12px;color:#8892b0;margin-top:10px;">单位：秒 (s)</p>
                </div>
            </div>
        </div>
        
        <!-- 事件追踪 -->
        <div class="tab-content" id="tab-events">
            <div class="grid-2col">
                <div class="chart-section">
                    <h2>👆 点击事件排行</h2>
                    <div class="chart-container">
                        <div class="bar-chart" id="clickChart"></div>
                    </div>
                </div>
                <div class="chart-section">
                    <h2>🎯 转化事件</h2>
                    <div class="chart-container">
                        <div class="bar-chart" id="conversionChart"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const PASSWORD = 'xingxingya2024';
        let statsData = null;
        
        function login() {
            const input = document.getElementById('password');
            const error = document.getElementById('error');
            
            if (input.value === PASSWORD) {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('statsContainer').style.display = 'block';
                loadStats();
            } else {
                error.textContent = '密码错误，请重试';
                input.value = '';
            }
        }
        
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector(`[onclick="switchTab('${tabName}')"]`).classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }
        
        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                if (!res.ok) throw new Error('获取失败');
                statsData = await res.json();
                renderStats();
            } catch (e) {
                document.getElementById('updateTime').textContent = '数据加载失败，请稍后重试';
            }
        }
        
        function renderStats() {
            if (!statsData) return;
            
            // 更新时间
            document.getElementById('updateTime').textContent = 
                `最后更新: ${new Date().toLocaleString('zh-CN')}`;
            
            // 核心指标
            document.getElementById('todayPv').textContent = statsData.today?.pv || 0;
            document.getElementById('todayUv').textContent = `UV: ${statsData.today?.uv || 0}`;
            document.getElementById('totalPv').textContent = statsData.totalPV || 0;
            document.getElementById('totalUv').textContent = `总UV: ${statsData.totalUV || 0}`;
            document.getElementById('avgTime').textContent = formatTime(statsData.avgTimeOnPage || 0);
            document.getElementById('timeCount').textContent = `记录数: ${statsData.timeOnPageCount || 0}`;
            
            const pvPerUv = statsData.totalUV > 0 ? 
                (statsData.totalPV / statsData.totalUV).toFixed(1) : 0;
            document.getElementById('pageViews').textContent = pvPerUv + 'x';
            
            // 渲染各图表
            renderTrendChart();
            renderDeviceChart();
            renderBrowserChart();
            renderPageChart();
            renderSourceChart();
            renderMediumChart();
            renderScrollDepth();
            renderTimeDistribution();
            renderClickChart();
            renderConversionChart();
        }
        
        function renderTrendChart() {
            const container = document.getElementById('trendChart');
            const trend = statsData.trend || [];
            
            if (trend.length === 0) {
                container.innerHTML = '<div class="no-data">暂无数据</div>';
                return;
            }
            
            const maxPv = Math.max(...trend.map(d => d.pv), 1);
            
            container.innerHTML = trend.map(d => `
                <div class="bar-row">
                    <div class="bar-label">${d.date.slice(5)}</div>
                    <div class="bar-track">
                        <div class="bar-fill" style="width: ${(d.pv / maxPv * 100)}%"></div>
                    </div>
                    <div class="bar-value">${d.pv} PV</div>
                </div>
                <div class="bar-row" style="opacity:0.7">
                    <div class="bar-label"></div>
                    <div class="bar-track" style="height:12px">
                        <div class="bar-fill" style="width: ${(d.uv / maxPv * 100)}%; background: linear-gradient(90deg, #4ade80, #22c55e)"></div>
                    </div>
                    <div class="bar-value">${d.uv} UV</div>
                </div>
            `).join('');
        }
        
        function renderDeviceChart() {
            const container = document.getElementById('deviceChart');
            const devices = statsData.devices || {};
            const total = Object.values(devices).reduce((a, b) => a + b, 0);
            
            const colors = { mobile: '#ff6b6b', desktop: '#4a9eff', tablet: '#6c5ce7' };
            const labels = { mobile: '📱 移动端', desktop: '💻 桌面端', tablet: '📲 平板' };
            
            container.innerHTML = Object.entries(devices)
                .filter(([_, count]) => count > 0)
                .map(([device, count]) => `
                    <div class="pie-item">
                        <div class="pie-dot" style="background: ${colors[device] || '#666'}"></div>
                        <span class="pie-label">${labels[device] || device}</span>
                        <span class="pie-value">${count} (${total > 0 ? Math.round(count / total * 100) : 0}%)</span>
                    </div>
                `).join('');
        }
        
        function renderBrowserChart() {
            const container = document.getElementById('browserChart');
            const browsers = statsData.browsers || {};
            
            const sorted = Object.entries(browsers).sort((a, b) => b[1] - a[1]).slice(0, 8);
            const maxCount = Math.max(...sorted.map(([_, c]) => c), 1);
            
            const colors = {
                wechat: '#07c160', chrome: '#4285f4', safari: '#fc615d',
                firefox: '#ff7139', edge: '#0078d4', other: '#888'
            };
            
            container.innerHTML = sorted.length > 0 ? sorted.map(([browser, count]) => `
                <div class="bar-row">
                    <div class="bar-label">${getBrowserName(browser)}</div>
                    <div class="bar-track">
                        <div class="bar-fill" style="width: ${count / maxCount * 100}%; background: ${colors[browser] || colors.other}"></div>
                    </div>
                    <div class="bar-value">${count}</div>
                </div>
            `).join('') : '<div class="no-data">暂无数据</div>';
        }
        
        function getBrowserName(browser) {
            const names = {
                wechat: '💬 微信',
                dingtalk: '💬 钉钉',
                feishu: '📮 飞书',
                safari: '🧭 Safari',
                chrome: '🌐 Chrome',
                firefox: '🦊 Firefox',
                edge: '🔷 Edge',
                other: '❓ 其他'
            };
            return names[browser] || browser;
        }
        
        function renderPageChart() {
            const container = document.getElementById('pageChart');
            const pages = statsData.pageRanking || [];
            const maxCount = Math.max(...pages.map(p => p.count), 1);
            
            container.innerHTML = pages.length > 0 ? pages.slice(0, 8).map(p => `
                <div class="bar-row">
                    <div class="bar-label">${p.page}</div>
                    <div class="bar-track">
                        <div class="bar-fill" style="width: ${p.count / maxCount * 100}%"></div>
                    </div>
                    <div class="bar-value">${p.count}</div>
                </div>
            `).join('') : '<div class="no-data">暂无数据</div>';
        }
        
        function renderSourceChart() {
            const container = document.getElementById('sourceChart');
            const sources = statsData.sourceRanking || [];
            const maxCount = Math.max(...sources.map(s => s.count), 1);
            
            const getSourceIcon = (source) => {
                if (source === 'direct') return '🔗 直接访问';
                if (source.includes('baidu')) return '🔍 百度';
                if (source.includes('google')) return '🔍 Google';
                if (source.includes('weibo')) return '📱 微博';
                if (source.includes('wechat')) return '💬 微信';
                if (source.includes('xiaohongshu')) return '📕 小红书';
                if (source.includes('zhihu')) return '💬 知乎';
                return '🌐 ' + source;
            };
            
            container.innerHTML = sources.length > 0 ? sources.slice(0, 10).map(s => `
                <div class="bar-row">
                    <div class="bar-label">${getSourceIcon(s.source)}</div>
                    <div class="bar-track">
                        <div class="bar-fill" style="width: ${s.count / maxCount * 100}%"></div>
                    </div>
                    <div class="bar-value">${s.count}</div>
                </div>
            `).join('') : '<div class="no-data">暂无数据</div>';
        }
        
        function renderMediumChart() {
            const container = document.getElementById('mediumChart');
            const mediums = statsData.mediums || {};
            
            const labels = {
                none: '🔗 直接访问',
                organic: '🔍 搜索引擎',
                social: '📱 社交媒体',
                referral: '🔗 外链跳转'
            };
            
            const colors = ['#4a9eff', '#6c5ce7', '#4ade80', '#f59e0b'];
            let idx = 0;
            
            container.innerHTML = Object.entries(mediums)
                .filter(([_, count]) => count > 0)
                .map(([medium, count]) => {
                    const label = labels[medium] || medium;
                    const color = colors[idx % colors.length];
                    idx++;
                    return `
                        <div class="pie-item">
                            <div class="pie-dot" style="background: ${color}"></div>
                            <span class="pie-label">${label}</span>
                            <span class="pie-value">${count}</span>
                        </div>
                    `;
                }).join('') || '<div class="no-data">暂无数据</div>';
        }
        
        function renderScrollDepth() {
            const container = document.getElementById('scrollIndicator');
            const scrollDepth = statsData.scrollDepth || {};
            const total = statsData.totalScrolls || 0;
            
            container.innerHTML = Object.entries(scrollDepth).map(([range, data]) => `
                <span>
                    <span>${data.percent}%</span>
                    ${range}%
                </span>
            `).join('');
        }
        
        function renderTimeDistribution() {
            const container = document.getElementById('timeDistChart');
            const times = statsData.timeOnPageCount || 0;
            
            // 模拟分布数据（实际应该从API获取）
            const ranges = [
                { label: '0-10s', count: Math.floor(times * 0.3) },
                { label: '10-30s', count: Math.floor(times * 0.35) },
                { label: '30-60s', count: Math.floor(times * 0.2) },
                { label: '1-3min', count: Math.floor(times * 0.1) },
                { label: '3min+', count: Math.floor(times * 0.05) }
            ];
            
            const maxCount = Math.max(...ranges.map(r => r.count), 1);
            
            container.innerHTML = ranges.map(r => `
                <div class="bar-row">
                    <div class="bar-label">${r.label}</div>
                    <div class="bar-track">
                        <div class="bar-fill" style="width: ${r.count / maxCount * 100}%; background: linear-gradient(90deg, #4ade80, #22c55e)"></div>
                    </div>
                    <div class="bar-value">${r.count}</div>
                </div>
            `).join('');
        }
        
        function renderClickChart() {
            const container = document.getElementById('clickChart');
            const clicks = statsData.clickRanking || [];
            const maxCount = Math.max(...clicks.map(c => c.count), 1);
            
            const eventNames = {
                chat_send: '💬 发送消息',
                chat_start: '🚀 开始聊天',
                nav_click: '🧭 导航点击',
                share_action: '📤 分享',
                external_link: '🔗 外部链接',
                generic_click: '👆 其他点击',
                start_test: '🧪 开始测试',
                begin_action: '▶️ 开始操作'
            };
            
            container.innerHTML = clicks.length > 0 ? clicks.slice(0, 10).map(c => `
                <div class="bar-row">
                    <div class="bar-label">${eventNames[c.name] || c.name}</div>
                    <div class="bar-track">
                        <div class="bar-fill" style="width: ${c.count / maxCount * 100}%; background: linear-gradient(90deg, #f59e0b, #f97316)"></div>
                    </div>
                    <div class="bar-value">${c.count}</div>
                </div>
            `).join('') : '<div class="no-data">暂无数据</div>';
        }
        
        function renderConversionChart() {
            const container = document.getElementById('conversionChart');
            const conversions = statsData.conversions || {};
            
            const entries = Object.entries(conversions);
            const maxCount = Math.max(...entries.map(([_, c]) => c), 1);
            
            container.innerHTML = entries.length > 0 ? entries.map(([name, count]) => `
                <div class="bar-row">
                    <div class="bar-label">${name}</div>
                    <div class="bar-track">
                        <div class="bar-fill" style="width: ${count / maxCount * 100}%; background: linear-gradient(90deg, #ec4899, #f43f5e)"></div>
                    </div>
                    <div class="bar-value">${count}</div>
                </div>
            `).join('') : '<div class="no-data">暂无转化数据</div>';
        }
        
        function formatTime(seconds) {
            if (seconds < 60) return seconds + 's';
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}m ${secs}s`;
        }
    </script>
</body>
</html>
