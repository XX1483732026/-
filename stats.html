<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访问统计 · 醒醒鸦</title>
    <link rel="icon" type="image/png" href="mengya.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0d0d0d 0%, #1a1a2e 50%, #2d2d44 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .login-box h1 { font-size: 24px; margin-bottom: 30px; }
        .login-box input {
            width: 100%;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .login-box button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #4a9eff, #6c5ce7);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }
        .login-box button:hover { opacity: 0.9; }
        .error { color: #ff6b6b; margin-top: 10px; font-size: 14px; }
        
        .stats-container { max-width: 1200px; margin: 0 auto; display: none; }
        .stats-header { text-align: center; padding: 40px 0; }
        .stats-header h1 { font-size: 32px; margin-bottom: 10px; }
        .stats-header p { color: #8892b0; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-card h3 { font-size: 14px; color: #8892b0; margin-bottom: 10px; }
        .stat-card .value { font-size: 36px; font-weight: bold; }
        .stat-card .change { font-size: 12px; margin-top: 5px; }
        .stat-card .change.up { color: #4ade80; }
        .stat-card .change.down { color: #f87171; }
        
        .chart-section { margin-bottom: 30px; }
        .chart-section h2 { font-size: 20px; margin-bottom: 20px; }
        .chart-container {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .bar-chart { display: flex; flex-direction: column; gap: 10px; }
        .bar-row { display: flex; align-items: center; gap: 15px; }
        .bar-label { width: 120px; font-size: 14px; color: #8892b0; text-align: right; }
        .bar-track { flex: 1; height: 24px; background: rgba(255,255,255,0.1); border-radius: 12px; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #4a9eff, #6c5ce7); border-radius: 12px; }
        .bar-value { width: 60px; font-size: 14px; text-align: right; }
        
        .loading { text-align: center; padding: 40px; color: #8892b0; }
    </style>
</head>
<body>
    <div class="login-box" id="loginBox">
        <h1>🦅 访问统计</h1>
        <input type="password" id="password" placeholder="输入密码查看统计" onkeypress="if(event.key==='Enter')login()">
        <button onclick="login()">查看数据</button>
        <div class="error" id="error"></div>
    </div>
    
    <div class="stats-container" id="statsContainer">
        <div class="stats-header">
            <h1>🦅 醒醒鸦访问统计</h1>
            <p id="updateTime">数据加载中...</p>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>今日访问量</h3>
                <div class="value" id="todayPv">-</div>
                <div class="change" id="todayChange"></div>
            </div>
            <div class="stat-card">
                <h3>总访问量</h3>
                <div class="value" id="totalPv">-</div>
            </div>
            <div class="stat-card">
                <h3>移动端访问</h3>
                <div class="value" id="mobileCount">-</div>
            </div>
            <div class="stat-card">
                <h3>桌面端访问</h3>
                <div class="value" id="desktopCount">-</div>
            </div>
        </div>
        
        <div class="chart-section">
            <h2>📊 近7天访问趋势</h2>
            <div class="chart-container">
                <div class="bar-chart" id="trendChart"></div>
            </div>
        </div>
        
        <div class="chart-section">
            <h2>📄 热门页面排行</h2>
            <div class="chart-container">
                <div class="bar-chart" id="pageChart"></div>
            </div>
        </div>
    </div>
    
    <script>
        const PASSWORD = 'xingxingya2024';
        
        function login() {
            const input = document.getElementById('password');
            const error = document.getElementById('error');
            
            if (input.value === PASSWORD) {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('statsContainer').style.display = 'block';
                loadStats();
            } else {
                error.textContent = '密码错误，请重试';
                input.value = '';
            }
        }
        
        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                renderStats(data);
            } catch (e) {
                document.getElementById('updateTime').textContent = '数据加载失败: ' + e.message;
            }
        }
        
        function renderStats(data) {
            // 更新时间
            document.getElementById('updateTime').textContent = '最后更新: ' + new Date().toLocaleString('zh-CN');
            
            // 今日数据
            const today = new Date().toISOString().split('T')[0];
            const todayData = data.daily[today] || { pv: 0 };
            document.getElementById('todayPv').textContent = todayData.pv;
            
            // 昨日对比
            const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
            const yesterdayData = data.daily[yesterday] || { pv: 0 };
            const change = yesterdayData.pv > 0 ? ((todayData.pv - yesterdayData.pv) / yesterdayData.pv * 100).toFixed(1) : 0;
            const changeEl = document.getElementById('todayChange');
            if (change > 0) {
                changeEl.className = 'change up';
                changeEl.textContent = '↑ ' + change + '% 较昨日';
            } else if (change < 0) {
                changeEl.className = 'change down';
                changeEl.textContent = '↓ ' + Math.abs(change) + '% 较昨日';
            } else {
                changeEl.textContent = '与昨日持平';
            }
            
            // 总访问量
            const totalPv = Object.values(data.daily).reduce((sum, d) => sum + d.pv, 0);
            document.getElementById('totalPv').textContent = totalPv;
            
            // 设备分布
            document.getElementById('mobileCount').textContent = data.devices.mobile || 0;
            document.getElementById('desktopCount').textContent = data.devices.desktop || 0;
            
            // 近7天趋势
            const trendChart = document.getElementById('trendChart');
            const days = [];
            for (let i = 6; i >= 0; i--) {
                const d = new Date(Date.now() - i * 86400000).toISOString().split('T')[0];
                days.push({ date: d, pv: (data.daily[d] || { pv: 0 }).pv });
            }
            const maxPv = Math.max(...days.map(d => d.pv), 1);
            trendChart.innerHTML = days.map(d => `
                <div class="bar-row">
                    <div class="bar-label">${d.date.slice(5)}</div>
                    <div class="bar-track"><div class="bar-fill" style="width: ${d.pv / maxPv * 100}%"></div></div>
                    <div class="bar-value">${d.pv}</div>
                </div>
            `).join('');
            
            // 热门页面
            const pageChart = document.getElementById('pageChart');
            const sortedPages = Object.entries(data.pages || {}).sort((a, b) => b[1] - a[1]).slice(0, 10);
            const maxPagePv = Math.max(...sortedPages.map(p => p[1]), 1);
            pageChart.innerHTML = sortedPages.map(([page, count]) => `
                <div class="bar-row">
                    <div class="bar-label">${page.slice(0, 15) || '/'}</div>
                    <div class="bar-track"><div class="bar-fill" style="width: ${count / maxPagePv * 100}%"></div></div>
                    <div class="bar-value">${count}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
