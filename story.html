<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小鸦的云朵心事 · 醒醒鸦</title>
    <link rel="icon" type="image/png" href="mengya.png">
    <meta name="description" content="小鸦的云朵心事 - 22页治愈系绘本，陪你度过每一个情绪时刻">
    <meta property="og:title" content="小鸦的云朵心事 · 醒醒鸦">
    <meta property="og:description" content="治愈系绘本，陪你度过每一个情绪时刻">
    <meta property="og:type" content="website">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0d0d0d 0%, #1a1a2e 50%, #2d2d44 100%);
            min-height: 100vh;
            color: #fff;
            touch-action: pan-y;
        }
        /* 顶部导航 */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(13, 13, 13, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 12px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            transition: background 0.3s;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.15);
        }
        .header-title {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }
        .page-indicator {
            font-size: 14px;
            color: #8892b0;
            background: rgba(255,255,255,0.1);
            padding: 6px 12px;
            border-radius: 20px;
        }
        /* 主阅读区域 */
        .reader-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 70px 16px 90px;
        }
        .page-wrapper {
            max-width: 420px;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .story-page {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            object-fit: contain;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .story-page.fade-out {
            opacity: 0;
            transform: scale(0.95);
        }
        /* 翻页按钮 */
        .nav-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 50;
            backdrop-filter: blur(10px);
        }
        .nav-btn:hover {
            background: rgba(255,255,255,0.25);
        }
        .nav-btn:active {
            transform: translateY(-50%) scale(0.95);
        }
        .nav-btn.prev { left: 12px; }
        .nav-btn.next { right: 12px; }
        .nav-btn.disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        /* 底部进度条 */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 16px;
            background: rgba(13, 13, 13, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .progress-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .progress-bar {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b8b8b, #d4d4d4);
            border-radius: 2px;
            transition: width 0.3s ease;
        }
        .progress-text {
            font-size: 12px;
            color: #8892b0;
            min-width: 40px;
            text-align: right;
        }
        /* 缩略图导航 */
        .thumbnails {
            display: none;
        }
        /* 加载状态 */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            z-index: 200;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            font-size: 14px;
            color: #8892b0;
        }
        /* 触摸反馈 */
        .touch-area {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 25%;
            z-index: 10;
        }
        .touch-area.left { left: 0; }
        .touch-area.right { right: 0; }
        /* 响应式 */
        @media (max-width: 480px) {
            .nav-btn {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
            .nav-btn.prev { left: 8px; }
            .nav-btn.next { right: 8px; }
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <a href="community.html" class="back-btn">
            <span>←</span>
            <span>返回</span>
        </a>
        <span class="header-title">小鸦的云朵心事</span>
        <span class="page-indicator" id="pageIndicator">1/22</span>
    </header>

    <!-- 主阅读区域 -->
    <div class="reader-container" id="readerContainer">
        <div class="page-wrapper">
            <img class="story-page" id="storyPage" src="story_images/page_01.jpg" alt="绘本页面">
        </div>
        <!-- 触摸区域 -->
        <div class="touch-area left" id="touchPrev"></div>
        <div class="touch-area right" id="touchNext"></div>
    </div>

    <!-- 翻页按钮 -->
    <button class="nav-btn prev disabled" id="prevBtn" aria-label="上一页">‹</button>
    <button class="nav-btn next" id="nextBtn" aria-label="下一页">›</button>

    <!-- 底部进度 -->
    <div class="footer">
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 4.55%"></div>
            </div>
            <span class="progress-text" id="progressText">1/22</span>
        </div>
    </div>

    <!-- 加载状态 -->
    <div class="loading" id="loading" style="display: none;">
        <div class="loading-spinner"></div>
        <span class="loading-text">加载中...</span>
    </div>

    <script>
        // 绘本数据
        const totalPages = 22;
        let currentPage = 1;
        let isAnimating = false;
        let touchStartX = 0;
        let touchEndX = 0;

        // DOM元素
        const storyPage = document.getElementById('storyPage');
        const pageIndicator = document.getElementById('pageIndicator');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const loading = document.getElementById('loading');
        const touchPrev = document.getElementById('touchPrev');
        const touchNext = document.getElementById('touchNext');

        // 预加载图片
        function preloadImages() {
            for (let i = 1; i <= totalPages; i++) {
                const img = new Image();
                img.src = `story_images/page_${String(i).padStart(2, '0')}.jpg`;
            }
        }

        // 更新页面
        function updatePage(newPage, direction) {
            if (isAnimating || newPage < 1 || newPage > totalPages) return;
            
            isAnimating = true;
            
            // 淡出动画
            storyPage.classList.add('fade-out');
            
            setTimeout(() => {
                currentPage = newPage;
                const imgPath = `story_images/page_${String(currentPage).padStart(2, '0')}.jpg`;
                storyPage.src = imgPath;
                
                // 更新指示器
                pageIndicator.textContent = `${currentPage}/${totalPages}`;
                progressText.textContent = `${currentPage}/${totalPages}`;
                progressFill.style.width = `${(currentPage / totalPages) * 100}%`;
                
                // 更新按钮状态
                prevBtn.classList.toggle('disabled', currentPage === 1);
                nextBtn.classList.toggle('disabled', currentPage === totalPages);
                
                // 淡入动画
                storyPage.classList.remove('fade-out');
                isAnimating = false;
            }, 150);
        }

        // 上一页
        function goPrev() {
            if (currentPage > 1) {
                updatePage(currentPage - 1, 'prev');
            }
        }

        // 下一页
        function goNext() {
            if (currentPage < totalPages) {
                updatePage(currentPage + 1, 'next');
            }
        }

        // 事件监听
        prevBtn.addEventListener('click', goPrev);
        nextBtn.addEventListener('click', goNext);

        // 触摸区域点击
        touchPrev.addEventListener('click', goPrev);
        touchNext.addEventListener('click', goNext);

        // 触摸滑动
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        }, { passive: true });

        document.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].clientX;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const diff = touchStartX - touchEndX;
            const threshold = 50;
            
            if (Math.abs(diff) > threshold) {
                if (diff > 0) {
                    // 左滑 - 下一页
                    goNext();
                } else {
                    // 右滑 - 上一页
                    goPrev();
                }
            }
        }

        // 键盘导航
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                goPrev();
            } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                goNext();
            }
        });

        // 鼠标滚轮
        document.addEventListener('wheel', (e) => {
            if (e.deltaY > 0) {
                goNext();
            } else {
                goPrev();
            }
        }, { passive: true });

        // 图片加载
        storyPage.addEventListener('load', () => {
            loading.style.display = 'none';
        });

        storyPage.addEventListener('error', () => {
            console.error('图片加载失败');
            loading.style.display = 'none';
        });

        // 初始化
        function init() {
            preloadImages();
            updatePage(1);
        }

        init();
    </script>
</body>
</html>
