<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小鸦的云朵心事 · 醒醒鸦</title>
    <link rel="icon" type="image/png" href="mengya.png">
    <meta name="description" content="小鸦的云朵心事 - 22页治愈系绘本，陪你度过每一个情绪时刻">
    <meta property="og:title" content="小鸦的云朵心事 · 醒醒鸦">
    <meta property="og:description" content="治愈系绘本，陪你度过每一个情绪时刻">
    <meta property="og:type" content="website">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
        }
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0d0d0d 0%, #1a1a2e 50%, #2d2d44 100%);
            color: #fff;
            touch-action: pan-y;
        }
        /* 顶部导航 */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(13, 13, 13, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 12px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            transition: background 0.3s;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.15);
        }
        .header-title {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }
        .page-indicator {
            font-size: 14px;
            color: #8892b0;
            background: rgba(255,255,255,0.1);
            padding: 6px 12px;
            border-radius: 20px;
        }
        /* 主阅读区域 */
        .reader-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding-top: 60px;
        }
        /* 图片区域 */
        .image-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            min-height: 0;
            overflow: hidden;
        }
        .story-image {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            object-fit: contain;
            transition: opacity 0.3s ease;
        }
        /* 文字区域 */
        .text-area {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            padding: 20px 24px;
            min-height: 80px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .story-title {
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            color: #fff;
            margin-bottom: 8px;
        }
        .story-text {
            font-size: 16px;
            line-height: 1.8;
            text-align: center;
            color: #ccd6f6;
        }
        /* 翻页按钮 */
        .nav-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 50;
            backdrop-filter: blur(10px);
        }
        .nav-btn:hover {
            background: rgba(255,255,255,0.25);
        }
        .nav-btn:active {
            transform: translateY(-50%) scale(0.95);
        }
        .nav-btn.prev { left: 12px; }
        .nav-btn.next { right: 12px; }
        .nav-btn.disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        /* 底部进度条 */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 12px 16px;
            background: rgba(13, 13, 13, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b8b8b, #d4d4d4);
            border-radius: 2px;
            transition: width 0.3s ease;
        }
        /* 触摸滑动提示 */
        .swipe-hint {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #5a6a8a;
            opacity: 0.6;
            pointer-events: none;
        }
        @media (max-width: 480px) {
            .nav-btn {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
            .nav-btn.prev { left: 8px; }
            .nav-btn.next { right: 8px; }
            .story-text {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="header">
        <a href="community.html" class="back-btn">← 返回</a>
        <div class="header-title">小鸦的云朵心事</div>
        <div class="page-indicator" id="pageIndicator">1 / 22</div>
    </div>

    <!-- 主阅读区域 -->
    <div class="reader-container" id="readerContainer">
        <!-- 图片区域 -->
        <div class="image-area">
            <img class="story-image" id="storyImage" src="story_images/page_01.jpg" alt="绘本页面">
        </div>
        <!-- 文字区域 -->
        <div class="text-area" id="textArea">
            <div class="story-title" id="storyTitle">小鸦的云朵心事</div>
            <div class="story-text" id="storyText"></div>
        </div>
    </div>

    <!-- 翻页按钮 -->
    <button class="nav-btn prev disabled" id="prevBtn" onclick="prevPage()">←</button>
    <button class="nav-btn next" id="nextBtn" onclick="nextPage()">→</button>

    <!-- 底部进度条 -->
    <div class="footer">
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 4.5%"></div>
        </div>
    </div>

    <div class="swipe-hint">← 左右滑动翻页 →</div>

    <script src="js/story_data.js"></script>
    <script>
        let currentPage = 1;
        const totalPages = storyPages.length;

        function updatePage() {
            const pageData = storyPages[currentPage - 1];
            
            // 更新图片
            const img = document.getElementById('storyImage');
            img.style.opacity = 0;
            setTimeout(() => {
                img.src = `story_images/page_${String(currentPage).padStart(2, '0')}.jpg`;
                img.style.opacity = 1;
            }, 150);

            // 更新文字
            const titleEl = document.getElementById('storyTitle');
            const textEl = document.getElementById('storyText');
            
            if (pageData.title) {
                titleEl.textContent = pageData.title;
                titleEl.style.display = 'block';
            } else {
                titleEl.style.display = 'none';
            }
            
            textEl.textContent = pageData.text || '';

            // 更新页码
            document.getElementById('pageIndicator').textContent = `${currentPage} / ${totalPages}`;
            
            // 更新进度条
            const progress = (currentPage / totalPages) * 100;
            document.getElementById('progressFill').style.width = progress + '%';

            // 更新按钮状态
            document.getElementById('prevBtn').classList.toggle('disabled', currentPage === 1);
            document.getElementById('nextBtn').classList.toggle('disabled', currentPage === totalPages);
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                updatePage();
            }
        }

        function nextPage() {
            if (currentPage < totalPages) {
                currentPage++;
                updatePage();
            }
        }

        // 键盘翻页
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft') prevPage();
            if (e.key === 'ArrowRight') nextPage();
        });

        // 触摸滑动翻页
        let touchStartX = 0;
        let touchEndX = 0;

        document.getElementById('readerContainer').addEventListener('touchstart', function(e) {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        document.getElementById('readerContainer').addEventListener('touchend', function(e) {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) {
                    nextPage();
                } else {
                    prevPage();
                }
            }
        }

        // 初始化
        updatePage();
    </script>
</body>
</html>
