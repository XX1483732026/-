<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小鸦的云朵心事 · 醒醒鸦</title>
    <link rel="icon" type="image/png" href="mengya.png">
    <meta name="description" content="小鸦的云朵心事 - 22页治愈系绘本，陪你度过每一个情绪时刻">
    <meta property="og:title" content="小鸦的云朵心事 · 醒醒鸦">
    <meta property="og:description" content="治愈系绘本，陪你度过每一个情绪时刻">
    <meta property="og:type" content="website">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            font-family: 'Noto Serif SC', 'Songti SC', serif;
            background: #0a0a0a;
            color: #fff;
            touch-action: pan-y;
        }
        /* 主容器 */
        .page-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        /* 图片区域 */
        .image-area {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg, #1a1a2e 0%, #2d2d44 100%);
        }
        .story-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            transition: opacity 0.3s ease;
        }
        /* 封面标题层 */
        .cover-title-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 40px 24px 24px;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 70%, transparent 100%);
            display: none;
        }
        .cover-title-layer.show {
            display: block;
        }
        .cover-title {
            font-size: 28px;
            font-weight: 600;
            text-align: center;
            color: #fff;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        .cover-subtitle {
            font-size: 14px;
            text-align: center;
            color: rgba(255,255,255,0.7);
        }
        /* 文字区域 */
        .text-area {
            background: #faf8f5;
            padding: 24px 20px;
            min-height: 100px;
            max-height: 35vh;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .text-area.hidden {
            display: none;
        }
        .story-text {
            font-size: 16px;
            line-height: 1.9;
            text-align: center;
            color: #2c3e50;
            letter-spacing: 0.5px;
        }
        /* 页码 */
        .page-num {
            position: absolute;
            right: 20px;
            bottom: 12px;
            font-size: 12px;
            color: #999;
        }
        /* 顶部导航栏 */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
        }
        .back-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            transition: background 0.3s;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.25);
        }
        .header-right {
            width: 80px;
        }
        /* 翻页按钮 */
        .nav-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 50;
            backdrop-filter: blur(10px);
        }
        .nav-btn:hover {
            background: rgba(255,255,255,0.35);
        }
        .nav-btn:active {
            transform: translateY(-50%) scale(0.95);
        }
        .nav-btn.prev { left: 12px; }
        .nav-btn.next { right: 12px; }
        .nav-btn.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        /* 底部进度条 */
        .progress-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(255,255,255,0.1);
            z-index: 100;
        }
        .progress-fill {
            height: 100%;
            background: rgba(255,255,255,0.6);
            transition: width 0.3s ease;
        }
        @media (max-width: 480px) {
            .nav-btn {
                width: 36px;
                height: 36px;
                font-size: 14px;
            }
            .nav-btn.prev { left: 8px; }
            .nav-btn.next { right: 8px; }
            .story-text {
                font-size: 15px;
            }
            .cover-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="header">
        <a href="community.html" class="back-btn">← 返回</a>
        <div class="header-right"></div>
    </div>

    <!-- 主容器 -->
    <div class="page-container" id="pageContainer">
        <!-- 图片区域 -->
        <div class="image-area">
            <img class="story-image" id="storyImage" src="story_images/page_01.jpg" alt="绘本页面">
            <!-- 封面标题层 -->
            <div class="cover-title-layer" id="coverTitleLayer">
                <div class="cover-title">小鸦的云朵心事</div>
                <div class="cover-subtitle">醒醒鸦</div>
            </div>
        </div>
        <!-- 文字区域 -->
        <div class="text-area" id="textArea">
            <div class="story-text" id="storyText"></div>
            <div class="page-num" id="pageNum"></div>
        </div>
    </div>

    <!-- 翻页按钮 -->
    <button class="nav-btn prev disabled" id="prevBtn" onclick="prevPage()">←</button>
    <button class="nav-btn next" id="nextBtn" onclick="nextPage()">→</button>

    <!-- 底部进度条 -->
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 4.5%"></div>
    </div>

    <script src="js/story_data.js"></script>
    <script>
        let currentPage = 1;
        const totalPages = storyPages.length;

        function updatePage() {
            const pageData = storyPages[currentPage - 1];
            
            // 更新图片
            const img = document.getElementById('storyImage');
            const newSrc = 'story_images/page_' + String(currentPage).padStart(2, '0') + '.jpg';
            
            img.style.opacity = 0;
            setTimeout(function() {
                img.src = newSrc;
                img.style.opacity = 1;
            }, 150);

            // 封面页特殊处理
            const coverTitleLayer = document.getElementById('coverTitleLayer');
            const textArea = document.getElementById('textArea');
            const pageNum = document.getElementById('pageNum');
            
            if (currentPage === 1) {
                coverTitleLayer.classList.add('show');
                textArea.classList.add('hidden');
            } else if (currentPage === totalPages) {
                coverTitleLayer.classList.remove('show');
                textArea.classList.add('hidden');
            } else {
                coverTitleLayer.classList.remove('show');
                textArea.classList.remove('hidden');
                document.getElementById('storyText').textContent = pageData.text || '';
                pageNum.textContent = (currentPage - 1) + ' / ' + (totalPages - 2);
            }

            // 更新进度条
            const progress = (currentPage / totalPages) * 100;
            document.getElementById('progressFill').style.width = progress + '%';

            // 更新按钮状态
            document.getElementById('prevBtn').classList.toggle('disabled', currentPage === 1);
            document.getElementById('nextBtn').classList.toggle('disabled', currentPage === totalPages);
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                updatePage();
            }
        }

        function nextPage() {
            if (currentPage < totalPages) {
                currentPage++;
                updatePage();
            }
        }

        // 键盘翻页
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft') prevPage();
            if (e.key === 'ArrowRight') nextPage();
        });

        // 触摸滑动翻页
        let touchStartX = 0;
        let touchEndX = 0;

        document.getElementById('pageContainer').addEventListener('touchstart', function(e) {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        document.getElementById('pageContainer').addEventListener('touchend', function(e) {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) {
                    nextPage();
                } else {
                    prevPage();
                }
            }
        }

        // 初始化
        updatePage();
    </script>
</body>
</html>
